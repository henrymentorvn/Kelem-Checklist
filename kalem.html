// ---- HIẾU: Thực hiện kiểm kê ----
function renderKKCheck(freq) {
  const periodKey = getKKPeriodKey(freq);
  if(!kkRecords[periodKey]) kkRecords[periodKey] = {};
  const rec = kkRecords[periodKey];
  const freqLabel = freq === 'ngay' ? 'Kiểm kê hàng ngày' : 'Kiểm kê hàng tuần';
  const filteredItems = kkItems.filter(item => item.tanSuat === freq);
  const locked = isKKLocked(freq);
  const isAdmin = ROLES[currentRole] && ROLES[currentRole].type === 'admin';

  if(!filteredItems.length) {
    document.getElementById('main-content').innerHTML =
      `<div class="kk-wrap"><div class="sec-title">${freqLabel}</div><div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">Chưa có vật dụng nào được thiết lập kiểm kê ${freq==='ngay'?'hàng ngày':'hàng tuần'}.<br><br>Vào tab <strong>Thiết lập</strong> để thêm vào.</div></div>`;
    return;
  }

  // Đếm stats
  const total = filteredItems.length;
  const done = filteredItems.filter((item,i) => rec[kkItems.indexOf(item)] && rec[kkItems.indexOf(item)].saved).length;
  const warns = filteredItems.filter((item) => {
    const idx = kkItems.indexOf(item);
    const r = rec[idx];
    if(!r || !r.saved) return false;
    return (item.soluongChuan - (r.soLuongThucTe||0)) > item.nguong || r.chatLuong === 'hu' || r.chatLuong === 'thay';
  }).length;

  let h = `<div class="kk-wrap">`;
  h += `<div class="sec-title">${freqLabel} — ${periodKey.startsWith('W_') ? 'Tuần từ ' + periodKey.replace('W_','') : periodKey}</div>`;

  // Stats
  h += `<div class="kk-stats">
    <div class="kk-stat"><div class="kk-stat-num" style="color:var(--green)">${done}/${total}</div><div class="kk-stat-label">Đã kiểm</div></div>
    <div class="kk-stat"><div class="kk-stat-num" style="color:#C62828">${warns}</div><div class="kk-stat-label">Cảnh báo</div></div>
    <div class="kk-stat"><div class="kk-stat-num" style="color:var(--brown)">${total-done}</div><div class="kk-stat-label">Chưa kiểm</div></div>
  </div>`;

  // Lock banner
  if(locked) {
    const lk = kkLockState[getKKPeriodKey(freq)];
    h += `<div class="lock-banner locked">
      🔒 Đã khóa bởi Ka lúc ${lk.lockedAt}
      ${isAdmin ? `<button class="lock-btn do-unlock" onclick="unlockKK('${freq}')">Mở khóa</button>` : ''}
    </div>`;
    h += renderKKCompare(freq);
  } else if(isAdmin && done === total && total > 0) {
    h += `<div class="lock-banner unlocked">
      Chưa khóa — Ka xác nhận xong thì bấm Khóa để bảo toàn dữ liệu
      <button class="lock-btn do-lock" onclick="lockKK('${freq}')">Khóa kỳ này</button>
    </div>`;
  }

  // Group items
  const groups = {};
  filteredItems.forEach(item => {
    const idx = kkItems.indexOf(item);
    if(!groups[item.group]) groups[item.group] = [];
    groups[item.group].push({...item, idx});
  });

  Object.entries(KK_GROUPS).forEach(([gkey, glabel]) => {
    const items = groups[gkey];
    if(!items || !items.length) return;
    h += `<div class="kk-group-label">${glabel}</div>`;

    items.forEach(({idx, name, donvi, soluongChuan, nguong, mucDich, ghichu}) => {
      const r = rec[idx] || {};
      const isSaved = r.saved;
      const diff = soluongChuan - (r.soLuongThucTe || 0);
      const isWarn = isSaved && (diff > nguong || r.chatLuong === 'hu' || r.chatLuong === 'thay');
      const isDanger = isSaved && (r.chatLuong === 'hu' || diff > nguong * 2);

      h += `<div class="kk-item-card${isDanger?' danger':isWarn?' warn':''}">`;
      h += `<div class="kk-item-header">
        <div class="kk-item-name">${name}</div>
        ${isWarn ? '<span style="font-size:18px">⚠️</span>' : isSaved ? '<span style="color:#2E7D32;font-size:16px">✓</span>' : ''}
      </div>`;

      if(mucDich) h += `<div class="kk-item-meta">Mục đích: ${mucDich} · Chuẩn: ${soluongChuan} ${donvi}${ghichu?' · '+ghichu:''}</div>`;

      if(isSaved) {
        const clObj = KK_CHATLG[r.chatLuong] || KK_CHATLG.tot;
        h += `<div class="kk-saved-row">
          <span class="kk-item-badge ${clObj.cls.replace('sel-','badge-')}" style="font-size:12px">${clObj.label}</span>
          <span style="margin-left:8px">Thực tế: <strong>${r.soLuongThucTe} ${donvi}</strong></span>
          ${diff !== 0 ? `<span class="kk-qty-diff" style="color:${diff>0?'#C62828':'#2E7D32'}">${diff>0?'−'+diff:'+'+Math.abs(diff)} ${donvi}</span>` : ''}
          <button class="kk-edit-btn" onclick="editKKRecord(${idx},'${freq}')">Sửa</button>
        </div>`;
        if(r.ghiChuThucTe) h += `<div style="font-size:12px;color:#666;margin-top:4px">Ghi chú: ${r.ghiChuThucTe}</div>`;
        if(r.deXuat && r.deXuat !== 'Không cần xử lý') h += `<div style="font-size:12px;color:var(--brown);margin-top:2px">Đề xuất: ${r.deXuat}</div>`;
        if(isWarn) h += `<div class="kk-warn-box">⚠ Hao hụt vượt ngưỡng ${nguong} ${donvi} — Đã báo cáo cho Henry/Ka</div>`;
      } else {
        // Form kiểm
        const curCL = r.chatLuong || 'tot';
        h += `<div class="kk-chatlg-row">`;
        Object.entries(KK_CHATLG).forEach(([key,val]) => {
          h += `<button class="kk-chatlg-btn ${curCL===key?val.cls:''}" onclick="setKKCL(${idx},'${key}','${freq}')">${val.label}</button>`;
        });
        h += `</div>`;

        h += `<div class="kk-qty-row">
          <div class="kk-qty-label">Số lượng thực tế</div>
          <input type="number" class="kk-qty-input" id="kk-qty-${idx}" value="${r.soLuongThucTe!==undefined?r.soLuongThucTe:soluongChuan}" step="0.5">
          <span class="kk-qty-unit">${donvi}</span>
          <span class="kk-qty-diff" id="kk-diff-${idx}" style="color:${diff>0?'#C62828':'var(--green)'}">${diff!==0?(diff>0?'−'+diff:'+'+Math.abs(diff))+' '+donvi:''}</span>
        </div>`;

        h += `<input class="kk-note-input" id="kk-note-${idx}" placeholder="Ghi chú: lý do hao hụt, tình trạng cụ thể..." value="${r.ghiChuThucTe||''}">`;

        h += `<div class="kk-dexuat-row">`;
        KK_DEXUAT.forEach(dx => {
          h += `<button class="kk-dexuat-btn ${r.deXuat===dx?'sel':''}" onclick="setKKDeXuat(${idx},'${dx}','${freq}')">${dx}</button>`;
        });
        h += `</div>`;

        h += `<button class="kk-save-item-btn" onclick="saveKKRecord(${idx},'${freq}')">Lưu kiểm kê</button>`;
      }
      h += `</div>`;
    });
  });

  // Nút hoàn tất kiểm kê
  if(done === total && total > 0) {
    h += `<div style="background:#E8F5E9;border:1px solid #A5D6A7;border-radius:10px;padding:14px;text-align:center;font-size:13px;color:#2E7D32;margin-top:8px">✓ Đã kiểm kê đầy đủ ${total} mục hôm nay!<br>${warns>0?'<span style="color:#C62828">⚠ '+warns+' mục cần chú ý — đã báo cáo Henry/Ka</span>':''}</div>`;
  }

  h += '</div>';
  document.getElementById('main-content').innerHTML = h;
}

function setKKCL(idx, cl, freq) {
  const periodKey = getKKPeriodKey(freq);
  if(!kkRecords[periodKey]) kkRecords[periodKey] = {};
  if(!kkRecords[periodKey][idx]) kkRecords[periodKey][idx] = {};
  kkRecords[periodKey][idx].chatLuong = cl;
  saveKKRecords();
  renderKKCheck(freq);
}

function setKKDeXuat(idx, dx, freq) {
  const periodKey = getKKPeriodKey(freq);
  if(!kkRecords[periodKey]) kkRecords[periodKey] = {};
  if(!kkRecords[periodKey][idx]) kkRecords[periodKey][idx] = {};
  kkRecords[periodKey][idx].deXuat = dx;
  saveKKRecords();
  renderKKCheck(freq);
}

function saveKKRecord(idx, freq) {
  if(isKKLocked(freq)) {
    alert('Kỳ kiểm kê này đã được Ka khóa. Liên hệ Ka để mở khóa nếu cần sửa.');
    return;
  }
  const periodKey = getKKPeriodKey(freq);
  if(!kkRecords[periodKey]) kkRecords[periodKey] = {};
  if(!kkRecords[periodKey][idx]) kkRecords[periodKey][idx] = {};
  const qtyEl = document.getElementById('kk-qty-'+idx);
  const noteEl = document.getElementById('kk-note-'+idx);
  const soLuong = parseFloat(qtyEl ? qtyEl.value : 0) || 0;
  const note = noteEl ? noteEl.value.trim() : '';
  const item = kkItems[idx];
  const diff = item.soluongChuan - soLuong;

  kkRecords[periodKey][idx] = {
    ...kkRecords[periodKey][idx],
    soLuongThucTe: soLuong,
    ghiChuThucTe: note,
    saved: true,
    savedAt: new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}),
    haoHut: diff,
    isWarn: diff > item.nguong || kkRecords[periodKey][idx].chatLuong === 'hu',
  };
  saveKKRecords();
  // Gửi cảnh báo Telegram nếu dưới ngưỡng
  if(item && soLuong <= item.nguong) {
    tgCanhBaoNguyenLieu();
  }
  renderKKCheck(freq);
}

function editKKRecord(idx, freq) {
  if(isKKLocked(freq)) {
    alert('Kỳ kiểm kê này đã được Ka khóa. Liên hệ Ka để mở khóa nếu cần sửa.');
    return;
  }
  const periodKey = getKKPeriodKey(freq);
  if(kkRecords[periodKey] && kkRecords[periodKey][idx]) {
    kkRecords[periodKey][idx].saved = false;
    saveKKRecords();
    renderKKCheck(freq);
  }
}

// ---- ADMIN: Dashboard kiểm kê ----
function renderKKAdmin() {
  let h = '<div class="kk-wrap">';
  h += '<div class="sec-title">Tổng quan kiểm kê</div>';

  // Cảnh báo hiện tại
  const alerts = [];
  const todayKey = getKKPeriodKey('ngay');
  const weekKey = getKKPeriodKey('tuan');

  kkItems.forEach((item, idx) => {
    const periodKey = item.tanSuat === 'ngay' ? todayKey : weekKey;
    const r = kkRecords[periodKey] && kkRecords[periodKey][idx];
    if(r && r.saved && r.isWarn) {
      alerts.push({item, r, idx});
    }

function renderKetCaHistory() {
  const {startDate} = getKyLuong();
  let h = '<div class="wrap">';
  h += '<div class="sec-title">Lịch sử kết ca theo ngày</div>';

  // Month picker
  h += `<div class="month-picker">
    <button class="month-nav" onclick="changeMonthKC(-1)">‹</button>
    <div style="font-size:14px;font-weight:500" id="kc-month-label">${getMonthKey(currentMonth)}</div>
    <button class="month-nav" onclick="changeMonthKC(1)">›</button>
  </div>`;

  // Tổng tháng
  let totalMonth = 0;
  const days = [];
  const daysInMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth()+1, 0).getDate();
  const today = new Date();

  for(let i = daysInMonth; i >= 1; i--) {
    const d = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), i);
    if(d > today) continue;
    const dk = formatDateVN(d);
    const kc = ketcaState[dk];
    const ca1 = kc&&kc.hanh, ca2 = kc&&kc.thoa, ca3 = kc&&kc.hieu;
    // Chỉ tính tiền mặt đã confirmed + CK tổng ngày
    const totalTM=(ca1&&ca1.confirmed?parseInt(ca1.tienmat||0):0)
                +(ca2&&ca2.confirmed?parseInt(ca2.tienmat||0):0)
                +(ca3&&ca3.confirmed?parseInt(ca3.tienmat||0):0);
    const totalCK=getDayCK(dk);
    const total = totalTM+totalCK;
    if(total > 0) totalMonth += total;
    days.push({dk, d, kc, ca1, ca2, ca3, totalTM, totalCK, total});
  }

  // Summary
  const daysWithData = days.filter(d=>d.total>0).length;
  const avgDay = daysWithData ? Math.round(totalMonth/daysWithData) : 0;
  h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
    <div class="summary-stat"><div class="summary-stat-num">${fmtMoney(totalMonth)}</div><div class="summary-stat-label">Tổng tháng</div></div>
    <div class="summary-stat"><div class="summary-stat-num">${fmtMoney(avgDay)}</div><div class="summary-stat-label">Trung bình/ngày</div></div>
  </div>`;

  if(!days.length) {
    h += '<div style="text-align:center;color:#aaa;padding:32px;font-size:13px">Chưa có dữ liệu tháng này</div>';
  } else {
    days.forEach(({dk, d, ca1, ca2, ca3, totalTM, totalCK, total}) => {
      const dow = getDOW(d);
      const isWE = isWeekendOrHoliday(d);
      const hasData = ca1||ca2||ca3;
      // Hiển thị tiền mặt từng ca (chỉ ca confirmed mới có số)
      const t1txt = ca1&&ca1.confirmed ? fmtMoney(parseInt(ca1.tienmat||0)) : ca1&&ca1.submitted ? 'Chờ xác nhận' : 'Chưa báo';
      const t2txt = ca2&&ca2.confirmed ? fmtMoney(parseInt(ca2.tienmat||0)) : ca2&&ca2.submitted ? 'Chờ xác nhận' : 'Chưa báo';
      const t3txt = ca3&&ca3.confirmed ? fmtMoney(parseInt(ca3.tienmat||0)) : ca3&&ca3.submitted ? 'Chờ xác nhận' : 'Chưa báo';
      const ckRow = totalCK>0 ? `<div class="hdc-row"><span>Chuyển khoản (Ka)</span><span style="color:var(--green)">${fmtMoney(totalCK)}</span></div>` : '';
      h += `<div class="history-day-card" id="hdc-${dk}" onclick="toggleHDC('${dk}')">
        <div class="hdc-header">
          <div class="hdc-date">${dk} <span style="color:${isWE?'#C62828':'var(--muted)'};font-size:12px">(${dow})</span></div>
          ${hasData
            ? `<div class="hdc-total">${total?fmtMoney(total):'—'}</div>`
            : `<div class="hdc-missing">Chưa báo cáo</div>`}
          <div class="hdc-arrow" id="arrow-${dk}">›</div>
        </div>
        <div class="hdc-detail" id="detail-${dk}">
          <div class="hdc-row"><span>Ca 1 — Hạnh</span><span>${t1txt}</span></div>
          <div class="hdc-row"><span>Ca 2 — Thoa</span><span>${t2txt}</span></div>
          <div class="hdc-row"><span>Ca tối — Hiếu</span><span>${t3txt}</span></div>
          <div class="hdc-row" style="border-top:1px solid var(--border);margin-top:4px;padding-top:4px"><span>Tổng tiền mặt</span><span style="font-weight:500">${fmtMoney(totalTM)}</span></div>
          ${ckRow}
          ${ca1&&ca1.khach?`<div class="hdc-row"><span>Số khách</span><span>${parseInt(ca1.khach||0)+parseInt(ca2&&ca2.khach||0)+parseInt(ca3&&ca3.khach||0)} lượt</span></div>`:''}
          ${(ca1&&ca1.ghichu)||(ca2&&ca2.ghichu)||(ca3&&ca3.ghichu)
            ?`<div class="hdc-note">Ghi chú: ${[ca1&&ca1.ghichu,ca2&&ca2.ghichu,ca3&&ca3.ghichu].filter(Boolean).join(' | ')}</div>`:''}
        </div>
      </div>`;
    });
  }
  h += '</div>';
  document.getElementById('main-content').innerHTML = h;
}

// ===================== KHÓA KIỂM KÊ =====================
let kkLockState = {}; // {periodKey: {locked: bool, lockedAt, lockedBy}}

function loadKKLock() {
  try { const d=localStorage.getItem('kl_kk_lock');if(d)kkLockState=JSON.parse(d); } catch(e){}
}

function saveKKLock() {
  try { localStorage.setItem('kl_kk_lock',JSON.stringify(kkLockState)); } catch(e){}
  if(typeof dbSet==='function') dbSet('kk_lock', kkLockState);
}

function isKKLocked(freq) {
  const pk = getKKPeriodKey(freq);
  return !!(kkLockState[pk] && kkLockState[pk].locked);
}

function lockKK(freq) {
  const pk = getKKPeriodKey(freq);
  kkLockState[pk] = {
    locked: true,
    lockedAt: new Date().toLocaleString('vi-VN',{timeZone:'Asia/Ho_Chi_Minh'}),
    lockedBy: 'Ka',
    snapshot: JSON.parse(JSON.stringify(kkRecords[pk]||{})),
  };
  saveKKLock();
  alert('Đã khóa kiểm kê kỳ này. Nhân viên không thể sửa lịch sử.');
  renderKiemKe();
}

function unlockKK(freq) {
  showPIN("Mở khóa kiểm kê", "Nhập PIN quản trị để xác nhận", ()=>{
    const pk = getKKPeriodKey(freq);
    if(kkLockState[pk]) kkLockState[pk].locked = false;
    saveKKLock();
    alert("Đã mở khóa. Ka có thể chỉnh sửa lại.");
    renderKiemKe();
  }, true);
}

// So sánh kỳ hiện tại với kỳ trước đã khóa
function renderKKCompare(freq) {
  const pk = getKKPeriodKey(freq);
  const lock = kkLockState[pk];
  if(!lock || !lock.snapshot) return '';

  const cur = kkRecords[pk]||{};
  const prev = lock.snapshot;
  const diffs = [];

  kkItems.forEach((item, idx) => {
    if(item.tanSuat !== freq) return;
    const curRec = cur[idx];
    const prevRec = prev[idx];
    if(!curRec || !prevRec) return;
    const curQty = curRec.soLuongThucTe || 0;
    const prevQty = prevRec.soLuongThucTe || 0;
    const diff = curQty - prevQty;
    if(diff !== 0) diffs.push({name:item.name, donvi:item.donvi, prevQty, curQty, diff});
  });

  if(!diffs.length) return '';
  let h = `<div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:8px">
    <div style="font-size:12px;font-weight:600;color:var(--green);margin-bottom:8px">So sánh với kỳ đã khóa (${lock.lockedAt})</div>
    <div style="display:flex;font-size:11px;color:#aaa;padding:4px 0;border-bottom:1px solid var(--border);margin-bottom:4px">
      <span style="flex:1">Vật dụng</span><span style="width:60px;text-align:center">Kỳ trước</span><span style="width:60px;text-align:center">Hiện tại</span><span style="width:60px;text-align:right">Chênh lệch</span>
    </div>`;
  diffs.forEach(({name, donvi, prevQty, curQty, diff}) => {
    h += `<div class="kk-compare-row">
      <span class="kk-compare-name">${name}</span>
      <span class="kk-compare-prev">${prevQty} ${donvi}</span>
      <span class="kk-compare-cur">${curQty} ${donvi}</span>
      <span class="kk-compare-diff ${diff>0?'plus':'minus'}">${diff>0?'+':''}${diff} ${donvi}</span>
    </div>`;
  });
  h += '</div>';
  return h;
}


// ===================== PHÂN CÔNG CA THEO TUẦN =====================
// assignment: 'normal' = Thoa vòng trong + Hạnh vòng ngoài
//             'swap'   = Thoa vòng ngoài + Hạnh vòng trong
let weekAssignment = {};

function getWeekKey() {
  const today = new Date();
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  return 'W_' + monday.toLocaleDateString('vi-VN', {day:'2-digit',month:'2-digit',year:'numeric'});
}

function loadWeekAssignment() {
  try {
    const d = localStorage.getItem('kl_week_assign');
    if(d) weekAssignment = JSON.parse(d);
  } catch(e) {}
}

function saveWeekAssignment() {
  try { localStorage.setItem('kl_week_assign', JSON.stringify(weekAssignment)); } catch(e) {}
  if(typeof dbSet === 'function') dbSet('week_assignment', weekAssignment);
}

function getCurrentAssignment() {
  const wk = getWeekKey();
  return weekAssignment[wk] || 'normal';
}

// Trả về role thực tế của Thoa/Hạnh tuần này
function getActualRole(person) {
  const assign = getCurrentAssignment();
  if(assign === 'normal') {
    return person === 'thoa' ? 'thoa' : 'hanh'; // giữ nguyên
  } else {
    // swap: Thoa làm việc Hạnh, Hạnh làm việc Thoa
    return person === 'thoa' ? 'hanh' : 'thoa';
  }
}

function getAssignmentLabel() {
  const assign = getCurrentAssignment();
  const wk = getWeekKey().replace('W_','');
  if(assign === 'normal') {
    return `Tuần từ ${wk}: Thoa vòng trong · Hạnh vòng ngoài`;
  } else {
    return `Tuần từ ${wk}: Thoa vòng ngoài · Hạnh vòng trong`;
  }
}

function renderWeekAssign() {
  const assign = getCurrentAssignment();
  const wk = getWeekKey();
  let h = '<div class="wrap">';
  h += '<div class="sec-title">Phân công ca tuần này</div>';
  h += `<div style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">Đặt phân công đầu mỗi tuần. App tự gán checklist đúng người. Chỉ Hiếu mới đổi được.</div>`;

  // Hiển thị 2 lựa chọn
  const isNormal = assign === 'normal';
  h += `<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">`;

  // Option 1: Normal
  h += `<div onclick="setWeekAssign('normal')" style="background:var(--white);border:2px solid ${isNormal?'var(--green)':'var(--border)'};border-radius:14px;padding:16px;cursor:pointer;transition:border-color 0.15s">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${isNormal?'var(--green)':'var(--border)'};background:${isNormal?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
        ${isNormal?'<svg width="10" height="8" viewBox="0 0 10 8"><polyline points="1,4 3.5,7 9,1" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>':''}
      </div>
      <div>
        <div style="font-size:14px;font-weight:500;color:var(--ink)">Thoa vòng trong · Hạnh vòng ngoài</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">Thoa: quầy pha chế, trong quán · Hạnh: khu ngoài, toilet, vật nuôi</div>
      </div>
    </div>
  </div>`;

  // Option 2: Swap
  const isSwap = assign === 'swap';
  h += `<div onclick="setWeekAssign('swap')" style="background:var(--white);border:2px solid ${isSwap?'var(--green)':'var(--border)'};border-radius:14px;padding:16px;cursor:pointer;transition:border-color 0.15s">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${isSwap?'var(--green)':'var(--border)'};background:${isSwap?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
        ${isSwap?'<svg width="10" height="8" viewBox="0 0 10 8"><polyline points="1,4 3.5,7 9,1" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>':''}
      </div>
      <div>
        <div style="font-size:14px;font-weight:500;color:var(--ink)">Thoa vòng ngoài · Hạnh vòng trong</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">Thoa: khu ngoài, toilet, vật nuôi · Hạnh: quầy pha chế, trong quán</div>
      </div>
    </div>
  </div>`;
  h += '</div>';

  // Lịch sử phân công gần đây
  const recent = Object.entries(weekAssignment).slice(-4).reverse();
  if(recent.length > 1) {
    h += '<div class="sec-title">Lịch sử phân công</div>';
    recent.forEach(([wkey, val]) => {
      h += `<div style="font-size:13px;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--border)">
        ${wkey.replace('W_','')} — ${val==='normal'?'Thoa trong · Hạnh ngoài':'Thoa ngoài · Hạnh trong'}
      </div>`;
    });
  }
  h += '</div>';
  document.getElementById('main-content').innerHTML = h;
}

function setWeekAssign(val) {
  const wk = getWeekKey();
  weekAssignment[wk] = val;
  saveWeekAssignment();
  renderWeekAssign();
  // Refresh checklist nếu đang xem
  if(currentTab === 'checklist') renderChecklist();
}



function toggleDTCard(dk){
  const detail=document.getElementById('dtdetail-'+dk);
  const arrow=document.getElementById('dtarrow-'+dk);
  const card=document.getElementById('dtcard-'+dk);
  if(!detail)return;
  const isOpen=detail.classList.contains('show');
  detail.classList.toggle('show',!isOpen);
  if(arrow)arrow.classList.toggle('open',!isOpen);
  if(card)card.classList.toggle('expanded',!isOpen);
}

// ---- Helpers tính doanh thu ngày (dùng chung ở mọi nơi) ----
// CK của ngày lưu tại ketcaState[dk]['_ck'].value — tách hoàn toàn khỏi ca
function getDayCK(dk) {
  const kc = ketcaState[dk];
  if(!kc) return 0;
  // Cấu trúc mới: _ck.value
  if(kc['_ck'] && kc['_ck'].value !== undefined) return parseInt(kc['_ck'].value||0);
  // Migration từ cấu trúc cũ: hanh.ck khi kaEnteredCK=true
  if(kc.hanh && kc.hanh.kaEnteredCK) return parseInt(kc.hanh.ck||0);
  return 0;
}

function getTotalTMConfirmed(dk) {
  const kc = ketcaState[dk];
  if(!kc) return 0;
  return (kc.hanh&&kc.hanh.confirmed?parseInt(kc.hanh.tienmat||0):0)
       + (kc.thoa&&kc.thoa.confirmed?parseInt(kc.thoa.tienmat||0):0)
       + (kc.hieu&&kc.hieu.confirmed?parseInt(kc.hieu.tienmat||0):0);
}

function getDayTotal(dk) {
  return getTotalTMConfirmed(dk) + getDayCK(dk);
}

function saveKaDayCK(dk) {
  const el = document.getElementById('ck-dt-'+dk);
  if(!el) return;
  const ck = el.value || '0';
  if(!ketcaState[dk]) ketcaState[dk] = {};

  // Lưu CK vào field riêng _ck — không tạo ghost record, không chạm vào ca nào
  ketcaState[dk]['_ck'] = {
    value: ck,
    enteredBy: 'Ka',
    enteredAt: new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}),
  };

  // Dọn sạch CK cũ bị nhét vào hanh (cấu trúc lỗi cũ) nếu còn tồn tại
  if(ketcaState[dk]['hanh']) {
    ketcaState[dk]['hanh'].ck = '0';
    ketcaState[dk]['hanh'].kaEnteredCK = false;
  }
  if(ketcaState[dk]['thoa']) ketcaState[dk]['thoa'].ck = '0';
  if(ketcaState[dk]['hieu']) ketcaState[dk]['hieu'].ck = '0';

  saveKC();
  renderDoanhThu();
  // Mở lại card vừa nhập
  setTimeout(()=>{
    const card = document.getElementById('dtcard-'+dk);
    const detail = document.getElementById('dtdetail-'+dk);
    const arrow = document.getElementById('dtarrow-'+dk);
    if(detail){detail.classList.add('show');}
    if(arrow){arrow.classList.add('open');}
    if(card){card.classList.add('expanded');}
  }, 100);
}

document.getElementById("today-label").textContent=new Date().toLocaleDateString("vi-VN",{weekday:"short",day:"numeric",month:"numeric",timeZone:"Asia/Ho_Chi_Minh"});

clState = {date:getToday(), thoa:{}, hanh:{}, hieu:{}};
loadKK();

// Load Supabase sau — không block UI
function startSupabase() {
  try {
    initDB();
    load().then(() => {
      // Refresh UI sau khi có dữ liệu từ Supabase
      try {
        if(currentTab) switchTab(currentTab);
        const savedRole = localStorage.getItem('kl_role');
        if(savedRole && (ROLES[savedRole].type === 'admin' || ROLES[savedRole].type === 'lead')) {
          setupRealtimeListeners();
        }
      } catch(e) { console.warn('Post-load error:', e); }
    }).catch(e => console.warn('load error:', e));
  } catch(e) { console.warn('Supabase start error:', e); }
}

// Load Supabase SDK động sau khi app đã hiện lên
const sbScript = document.createElement('script');
sbScript.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
sbScript.onload = () => startSupabase();
sbScript.onerror = () => console.warn('Supabase CDN failed, using localStorage only');
document.head.appendChild(sbScript);

function setupRealtimeListeners() {
  dbListen((key, val) => {
    if(key === "checklist"){ clState = val; if(currentTab==="checklist") renderChecklist(); }
    else if(key === "ketca"){ ketcaState = val; if(currentTab==="xac-nhan") renderXacNhan(); if(currentTab==="doanh-thu") renderDoanhThu(); }
    else if(key === "chamcong"){ ccState = val; if(currentTab==="cham-cong"||currentTab==="cham-cong-admin") renderChamCong(); }
    else if(key === "scores"){ scoreState = val; }
    else if(key === "nguyen_lieu"){ nlState = val; }
    else if(key === "kk_items"){ kkItems = val; try{localStorage.setItem('kl_kk_items',JSON.stringify(val));}catch(e){} }
    else if(key === "kk_records"){ kkRecords = val; try{localStorage.setItem('kl_kk_records',JSON.stringify(val));}catch(e){} }
    else if(key === "kk_lock"){ kkLockState = val; try{localStorage.setItem('kl_kk_lock',JSON.stringify(val));}catch(e){} }
    else if(key === "week_assignment"){ weekAssignment = val; try{localStorage.setItem('kl_week_assign',JSON.stringify(val));}catch(e){} }
  });
}

// Gửi cảnh báo nguyên liệu
function tgCanhBaoNguyenLieu() {
  if(!kkItems || !kkItems.length) return;
  const today = new Date();
  const dk = today.toLocaleDateString('vi-VN', {day:'2-digit',month:'2-digit',year:'numeric'});
  // Tìm kỳ kiểm kê hôm nay
  const pkNgay = getKKPeriodKey('ngay');
  const recNgay = kkRecords[pkNgay] || {};
  const pkTuan = getKKPeriodKey('tuan');
  const recTuan = kkRecords[pkTuan] || {};

  const warnings = [];
  kkItems.forEach(function(item, idx) {
    const rec = item.tanSuat === 'ngay' ? recNgay[idx] : recTuan[idx];
    if(!rec || !rec.saved) return;
    if(rec.soLuongThucTe <= item.nguong) {
      warnings.push('\u26A0\uFE0F <b>' + item.name + '</b>: c\u00f2n ' + rec.soLuongThucTe + ' ' + item.donvi + ' (ng\u01b0\u1ee1ng ' + item.nguong + ' ' + item.donvi + ')');
    }
  });

  if(!warnings.length) return;
  const text = '\uD83D\uDEA8 <b>C\u1ea3nh b\u00e1o nguy\u00ean li\u1ec7u s\u1eafp h\u1ebft</b>\n\n'
    + warnings.join('\n')
    + '\n\n\uD83D\uDCCB C\u1ea7n mua b\u1ed5 sung ngay!';
  tgSend(text);
}
