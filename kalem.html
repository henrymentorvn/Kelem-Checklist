<!DOCTYPE html>
<html lang="vi-VN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Kalem — Vận Hành</title>



<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:#F0EDE6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:#1a1612}

:root{
  --green:#1B4332;
  --green-light:#2D6A4F;
  --green-pale:#E8F0EC;
  --brown:#8B5E3C;
  --brown-light:#A8784F;
  --brown-pale:#F5EDE3;
  --cream:#F5F0E8;
  --cream-dark:#EDE8DF;
  --ink:#1a1612;
  --muted:#888;
  --border:#DDD8CF;
  --white:#FFFFFF;
}

/* HEADER */
.app-header{background:var(--green);padding:10px 16px;position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:10px}
.header-logo{height:36px;width:auto;object-fit:contain}
.refresh-btn{background:rgba(255,255,255,0.15);border:none;color:rgba(255,255,255,0.85);font-size:16px;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;flex-shrink:0}
.refresh-btn:active{background:rgba(255,255,255,0.3)}
.refresh-btn.spinning{animation:spin 0.6s linear}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.role-pill{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.9);cursor:pointer;border:1px solid rgba(255,255,255,0.25);margin-left:4px;white-space:nowrap}
.date-badge{margin-left:auto;font-size:11px;color:rgba(255,255,255,0.75);white-space:nowrap}

/* TAB BAR */
.tab-bar{background:var(--green);border-bottom:1px solid rgba(255,255,255,0.1);position:sticky;top:57px;z-index:190;display:none;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab-bar.visible{display:flex}
.tab-btn{flex-shrink:0;padding:10px 16px;font-size:13px;color:rgba(255,255,255,0.6);border:none;background:none;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;white-space:nowrap}
.tab-btn.active{color:#fff;border-bottom-color:var(--brown-light)}

/* SCREENS */
.screen{display:none}.screen.active{display:block}
.wrap{padding:16px}

/* ROLE SELECT */
.role-select-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--cream)}
.role-select-logo{width:160px;margin-bottom:8px}
.role-select-sub{font-size:14px;color:var(--muted);margin-bottom:28px}
.role-btn{width:100%;max-width:320px;background:var(--white);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;text-align:left;transition:border-color 0.15s}
.role-btn:active{background:var(--cream)}
.role-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.av-thoa{background:#F0EDE8;color:var(--brown)}
.av-hanh{background:#E8F0EC;color:var(--green)}
.av-hieu{background:#F5EDE3;color:var(--brown-light)}
.av-admin{background:var(--green);color:#fff}
.role-info{flex:1}
.role-name{font-size:15px;font-weight:500;color:var(--ink)}
.role-desc{font-size:12px;color:var(--muted);margin-top:2px}

/* PIN MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--white);border-radius:20px;padding:24px;width:100%;max-width:320px}
.modal-title{font-size:17px;font-weight:600;margin-bottom:6px;color:var(--ink)}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.pin-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:22px;text-align:center;letter-spacing:10px;font-family:inherit;margin-bottom:12px}
.pin-input:focus{outline:none;border-color:var(--brown)}
.modal-btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;margin-bottom:8px}
.modal-btn.primary{background:var(--green);color:#fff}
.modal-btn.secondary{background:var(--cream-dark);color:var(--muted)}
.modal-error{font-size:13px;color:#c0392b;text-align:center;margin-bottom:8px;display:none}

/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;padding:14px 0 8px}

/* PERSON CARDS */
.person-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.15s}
.person-card:active{background:var(--cream)}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.person-info{flex:1;min-width:0}
.person-name{font-size:16px;font-weight:500;color:var(--ink)}
.person-role{font-size:12px;color:var(--muted);margin-top:2px}
.person-stats{text-align:right;flex-shrink:0}
.stat-num{font-size:15px;font-weight:500}
.stat-label{font-size:11px;color:#aaa;margin-top:1px}
.mini-bar-wrap{height:3px;background:var(--border);border-radius:2px;margin-top:6px;width:60px;margin-left:auto}
.mini-bar{height:3px;border-radius:2px;transition:width 0.3s}
.bar-thoa{background:var(--brown)}
.bar-hanh{background:var(--green)}
.bar-hieu{background:var(--brown-light)}

/* OVERVIEW */
.overview-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.ov-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ov-row:last-child{margin-bottom:0}
.ov-name{font-size:13px;color:#666;width:52px;flex-shrink:0}
.ov-bar-wrap{flex:1;height:6px;background:var(--cream-dark);border-radius:3px}
.ov-bar{height:6px;border-radius:3px;transition:width 0.4s}
.ov-pct{font-size:12px;color:var(--muted);width:34px;text-align:right;flex-shrink:0}

/* CHECKLIST */
.back-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.back-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--muted);padding:4px 0;font-family:inherit}
.progress-text{margin-left:auto;font-size:13px;color:var(--muted)}
.top-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-bottom:16px}
.top-bar{height:4px;border-radius:2px;transition:width 0.3s}
.task-sec-label{font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:0.6px;padding:10px 0 5px;margin-top:4px;border-bottom:1px solid var(--border);margin-bottom:6px}
.task-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:all 0.15s}
.task-card:active{background:var(--cream)}
.task-card.done{opacity:0.45}
.task-card.done .task-name{text-decoration:line-through;color:#aaa}
.task-card.priority{border-left:3px solid var(--brown)}
.check-circle{width:23px;height:23px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;background:var(--white);flex-shrink:0;margin-top:1px;transition:all 0.15s}
.ck-thoa{background:var(--brown);border-color:var(--brown)}
.ck-hanh{background:var(--green);border-color:var(--green)}
.ck-hieu{background:var(--brown-light);border-color:var(--brown-light)}
.task-body{flex:1;min-width:0}
.task-name{font-size:14px;color:var(--ink);line-height:1.4}
.task-name.ps::before{content:"★ ";color:var(--brown);font-size:12px}
.task-std{font-size:12px;color:var(--green-light);margin-top:3px;line-height:1.4}
.task-std::before{content:"✓ "}
.task-note{font-size:12px;color:var(--brown);margin-top:3px;line-height:1.4}
.task-note::before{content:"⚠ "}
.done-banner{background:#E8F5E9;border:1px solid #A5D6A7;border-radius:10px;padding:12px 16px;text-align:center;font-size:13px;color:#2E7D32;margin-bottom:14px}

/* KẾT CA */
.ketca-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.ketca-title{font-size:14px;font-weight:600;color:var(--green);margin-bottom:14px}
.field-label{font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
.field-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:12px;color:var(--ink);background:var(--cream)}
.field-input:focus{outline:none;border-color:var(--brown);background:var(--white)}
.submit-btn{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.submit-btn:active{opacity:0.85}
.confirm-btn{width:100%;padding:13px;background:var(--brown);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:8px}

/* REPORT */
.report-card{background:var(--white);border:2px solid var(--green);border-radius:16px;padding:20px;margin-top:4px}
.report-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.report-logo-img{height:32px;width:auto}
.report-date{font-size:12px;color:var(--muted);margin-left:auto}
.report-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--cream-dark)}
.report-row:last-child{border-bottom:none}
.report-label{font-size:13px;color:var(--muted)}
.report-value{font-size:14px;font-weight:500;color:var(--ink)}
.report-total{background:var(--green-pale);border-radius:10px;padding:12px;margin:12px 0;display:flex;justify-content:space-between;align-items:center}
.report-total-label{font-size:14px;font-weight:600;color:var(--green)}
.report-total-value{font-size:22px;font-weight:700;color:var(--green)}
.report-confirmed{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green);margin-top:8px}

/* NGUYÊN LIỆU */
.nl-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.nl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.nl-name{font-size:14px;font-weight:500;color:var(--ink)}
.nl-type{font-size:11px;padding:2px 8px;border-radius:20px}
.nl-tuoi{background:var(--brown-pale);color:var(--brown)}
.nl-kho{background:var(--green-pale);color:var(--green)}
.nl-input-row{display:flex;gap:8px;align-items:center}
.nl-input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--cream)}
.nl-input:focus{outline:none;border-color:var(--brown)}
.nl-save-btn{padding:8px 14px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit}
.nl-submitted{background:#E8F5E9;border:1px solid #A5D6A7;border-radius:8px;padding:8px 12px;font-size:12px;color:#2E7D32;margin-top:6px}
.nl-pending{background:var(--brown-pale);border:1px solid #D4A574;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--brown);margin-top:6px}
.nl-add-btn{width:100%;padding:12px;border:1.5px dashed var(--border);border-radius:10px;background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;margin-top:4px}

/* CHẤM ĐIỂM */
.score-person-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px}
.score-person-card:active{background:var(--cream)}
.score-badge{font-size:13px;font-weight:600;margin-left:auto;padding:4px 12px;border-radius:20px}
.badge-thoa{background:var(--brown-pale);color:var(--brown)}
.badge-hanh{background:var(--green-pale);color:var(--green)}
.score-task-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.score-task-name{font-size:13px;color:var(--ink);line-height:1.4;margin-bottom:10px;font-weight:500}
.score-task-name.ps::before{content:"★ ";color:var(--brown);font-size:11px}
.slider-row{display:flex;align-items:center;gap:10px}
.slider-row input[type=range]{flex:1;accent-color:var(--green)}
.score-num{font-size:22px;font-weight:700;color:var(--green);min-width:28px;text-align:right}
.score-labels{display:flex;justify-content:space-between;font-size:11px;color:#bbb;margin-top:3px}
.save-score-btn{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px;font-family:inherit}
.today-scored{background:var(--green-pale);border:1px solid #A5D6A7;border-radius:10px;padding:10px 14px;font-size:13px;color:var(--green);margin-bottom:14px;text-align:center}

/* TỔNG KẾT */
.month-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.month-avg{font-size:24px;font-weight:700;color:var(--green)}
.month-stat-row{display:flex;gap:8px;margin-top:10px}
.month-stat{flex:1;background:var(--cream);border-radius:8px;padding:8px;text-align:center}
.month-stat-num{font-size:16px;font-weight:600;color:var(--ink)}
.month-stat-label{font-size:11px;color:#aaa;margin-top:2px}
.reward-badge{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;margin-top:10px}
.reward-yes{background:#E8F5E9;color:#2E7D32}
.reward-no{background:var(--brown-pale);color:var(--brown)}
.month-picker{display:flex;align-items:center;justify-content:space-between;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:12px}
.month-nav{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:0 10px;font-family:inherit}
.threshold-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.threshold-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.threshold-input{width:56px;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;text-align:center;font-family:inherit}
.save-threshold-btn{padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit}
.summary-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.summary-stat{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.summary-stat-num{font-size:18px;font-weight:700;color:var(--green)}
.summary-stat-label{font-size:11px;color:#aaa;margin-top:3px}
.dt-day-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.dt-day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.dt-day-date{font-size:13px;font-weight:500;color:var(--ink)}
.dt-day-total{font-size:14px;font-weight:700;color:var(--green)}
.dt-ca-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:3px 0}
.dt-missing{font-size:12px;color:#c0392b}

/* CHẤM CÔNG */
.cc-wrap{padding:16px}
.cc-person-block{background:var(--white);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden}
.cc-person-header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--cream)}
.cc-person-name{font-size:15px;font-weight:500;color:var(--ink)}
.cc-person-shift{font-size:12px;color:var(--muted);margin-top:1px}
.cc-status-row{display:flex;gap:6px;padding:12px 16px 0}
.cc-status-btn{flex:1;padding:7px 4px;border:1.5px solid var(--border);border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;background:var(--white);color:var(--muted);text-align:center;transition:all 0.15s}
.cc-status-btn.selected-ok{background:#E8F5E9;border-color:#4CAF50;color:#2E7D32}
.cc-status-btn.selected-late{background:#FFF8E1;border-color:#FFC107;color:#E65100}
.cc-status-btn.selected-sick{background:#FFEBEE;border-color:#EF9A9A;color:#C62828}
.cc-status-btn.selected-leave{background:var(--green-pale);border-color:var(--green);color:var(--green)}
.cc-status-btn.selected-early{background:var(--brown-pale);border-color:var(--brown);color:var(--brown)}
.cc-time-row{display:flex;gap:10px;padding:10px 16px}
.cc-time-group{flex:1}
.cc-time-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.cc-time-input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--cream);color:var(--ink)}
.cc-time-input:focus{outline:none;border-color:var(--brown)}
.cc-reason-wrap{padding:0 16px 10px}
.cc-reason-input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--cream);color:var(--ink)}
.cc-reason-input:focus{outline:none;border-color:var(--brown)}
.cc-save-row{padding:10px 16px 14px}
.cc-save-btn{width:100%;padding:11px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.cc-save-btn:active{opacity:0.85}
.cc-saved-banner{margin:10px 16px 14px;background:#E8F5E9;border:1px solid #A5D6A7;border-radius:10px;padding:10px 14px;font-size:13px;color:#2E7D32}
.cc-edit-btn{background:none;border:none;color:var(--brown);font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;margin-left:8px}

/* BẢNG CHẤM CÔNG ADMIN */
.att-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}
.att-table th{background:var(--green);color:#fff;padding:7px 8px;text-align:left;font-weight:500}
.att-table td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:top}
.att-table tr:nth-child(even) td{background:var(--cream)}
.att-badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.att-ok{background:#E8F5E9;color:#2E7D32}
.att-late{background:#FFF8E1;color:#E65100}
.att-sick{background:#FFEBEE;color:#C62828}
.att-leave{background:var(--green-pale);color:var(--green)}
.att-early{background:var(--brown-pale);color:var(--brown)}
.att-none{background:#f5f5f5;color:#aaa}
.att-summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.att-sum-item{flex:1;min-width:80px;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.att-sum-num{font-size:18px;font-weight:700}
.att-sum-label{font-size:11px;color:var(--muted);margin-top:2px}

/* LƯƠNG */
.luong-wrap{padding:16px}
.luong-person-card{background:var(--white);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden}
.luong-person-header{padding:14px 16px;background:var(--green);display:flex;align-items:center;gap:12px}
.luong-person-header .lph-name{font-size:15px;font-weight:600;color:#fff}
.luong-person-header .lph-period{font-size:11px;color:rgba(255,255,255,0.75);margin-top:2px}
.luong-big{text-align:center;padding:16px 16px 10px}
.luong-big-num{font-size:32px;font-weight:700;color:var(--green)}
.luong-big-label{font-size:12px;color:var(--muted);margin-top:3px}
.luong-rows{padding:0 16px 14px}
.luong-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--cream-dark);font-size:13px}
.luong-row:last-child{border-bottom:none}
.luong-row-label{color:var(--muted)}
.luong-row-val{font-weight:500;color:var(--ink)}
.luong-row-val.plus{color:#2E7D32}
.luong-row-val.minus{color:#C62828}
.luong-row-val.total{color:var(--green);font-size:15px;font-weight:700}
.luong-divider{height:1px;background:var(--border);margin:4px 0}

/* BẢNG NGÀY CÔNG */
.cong-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:4px}
.cong-table th{background:var(--green);color:#fff;padding:6px 8px;text-align:left;font-weight:500}
.cong-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:top}
.cong-table tr:nth-child(even) td{background:var(--cream)}
.cong-badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}

/* NHÂN VIÊN TỰ XEM */
.my-luong-card{background:var(--white);border:2px solid var(--green);border-radius:16px;padding:20px;margin-bottom:12px}
.my-luong-title{font-size:13px;color:var(--muted);margin-bottom:4px}
.my-luong-num{font-size:36px;font-weight:700;color:var(--green);margin-bottom:4px}
.my-luong-sub{font-size:12px;color:var(--muted)}
.my-stat-row{display:flex;gap:8px;margin-top:12px}
.my-stat{flex:1;background:var(--cream);border-radius:10px;padding:10px;text-align:center}
.my-stat-num{font-size:18px;font-weight:700;color:var(--ink)}
.my-stat-label{font-size:11px;color:var(--muted);margin-top:2px}

/* NHẬP CÔNG QUÁ KHỨ */
.backfill-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.backfill-title{font-size:13px;font-weight:600;color:var(--green);margin-bottom:10px}
.backfill-day-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--cream-dark)}
.backfill-day-row:last-child{border-bottom:none}
.backfill-date{font-size:13px;color:var(--ink);width:70px;flex-shrink:0}
.backfill-dow{font-size:11px;color:var(--muted);width:30px;flex-shrink:0}
.backfill-sel{flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;background:var(--cream)}
.backfill-time{width:72px;padding:5px 6px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;background:var(--cream)}
.backfill-reason{flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;background:var(--cream)}
.backfill-save-btn{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:12px}

/* KIỂM KÊ */
.kk-wrap{padding:16px}
.kk-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.kk-stat{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}
.kk-stat-num{font-size:20px;font-weight:700}
.kk-stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.kk-group-label{font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:0.6px;padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px}
.kk-item-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.kk-item-card.warn{border-color:#FFC107;background:#FFFDE7}
.kk-item-card.danger{border-color:#EF9A9A;background:#FFEBEE}
.kk-item-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.kk-item-name{font-size:14px;font-weight:500;color:var(--ink);flex:1}
.kk-item-badge{font-size:11px;padding:2px 8px;border-radius:20px;white-space:nowrap}
.badge-ngay{background:var(--brown-pale);color:var(--brown)}
.badge-tuan{background:var(--green-pale);color:var(--green)}
.kk-item-meta{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.5}
.kk-chatlg-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.kk-chatlg-btn{padding:5px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;background:var(--white);color:var(--muted)}
.kk-chatlg-btn.sel-tot{background:#E8F5E9;border-color:#4CAF50;color:#2E7D32;font-weight:500}
.kk-chatlg-btn.sel-theo{background:#FFF8E1;border-color:#FFC107;color:#E65100;font-weight:500}
.kk-chatlg-btn.sel-hu{background:#FFEBEE;border-color:#EF9A9A;color:#C62828;font-weight:500}
.kk-chatlg-btn.sel-thay{background:var(--brown-pale);border-color:var(--brown);color:var(--brown);font-weight:500}
.kk-qty-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.kk-qty-label{font-size:12px;color:var(--muted);width:90px;flex-shrink:0}
.kk-qty-input{width:70px;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;text-align:center;font-family:inherit;background:var(--cream)}
.kk-qty-input:focus{outline:none;border-color:var(--brown)}
.kk-qty-unit{font-size:12px;color:var(--muted)}
.kk-qty-diff{font-size:12px;font-weight:500;margin-left:4px}
.kk-note-input{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;background:var(--cream);margin-bottom:8px}
.kk-note-input:focus{outline:none;border-color:var(--brown)}
.kk-dexuat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.kk-dexuat-btn{padding:4px 10px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;font-family:inherit;background:var(--white);color:var(--muted)}
.kk-dexuat-btn.sel{background:var(--green);border-color:var(--green);color:#fff}
.kk-save-item-btn{width:100%;padding:10px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.kk-saved-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;color:#2E7D32}
.kk-edit-btn{background:none;border:none;color:var(--brown);font-size:11px;cursor:pointer;font-family:inherit;text-decoration:underline;margin-left:auto}
.kk-warn-box{background:#FFEBEE;border:1px solid #EF9A9A;border-radius:8px;padding:8px 12px;font-size:12px;color:#C62828;margin-top:6px}
.kk-add-btn{width:100%;padding:12px;border:1.5px dashed var(--border);border-radius:10px;background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;margin-top:4px}

.setup-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.setup-title{font-size:14px;font-weight:600;color:var(--green);margin-bottom:14px}
.setup-field{margin-bottom:10px}
.setup-label{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500}
.setup-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--cream);color:var(--ink)}
.setup-input:focus{outline:none;border-color:var(--brown)}
.setup-row{display:flex;gap:8px}
.setup-row .setup-field{flex:1}
.setup-select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--cream);color:var(--ink)}
.setup-save-btn{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:6px}

/* DASHBOARD KIỂM KÊ ADMIN */
.kk-dash-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.kk-dash-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.kk-dash-name{font-size:13px;font-weight:500;flex:1}
.kk-dash-status{font-size:11px;padding:2px 8px;border-radius:20px}
.kk-dash-meta{font-size:12px;color:var(--muted);line-height:1.5}
.kk-alert-card{background:#FFEBEE;border:1px solid #EF9A9A;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.kk-alert-title{font-size:13px;font-weight:600;color:#C62828;margin-bottom:4px}
.kk-alert-meta{font-size:12px;color:#C62828}

/* LỊCH SỬ & KHÓA KIỂM KÊ */
.history-day-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s}

.hdc-date{font-size:13px;font-weight:500;color:var(--ink);flex:1}
.hdc-total{font-size:15px;font-weight:700;color:var(--green)}

.hdc-arrow.open{transform:rotate(90deg)}
.hdc-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:none}
.hdc-detail.show{display:block}
.hdc-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;color:var(--muted)}
.hdc-row span:last-child{font-weight:500;color:var(--ink)}
.hdc-missing{font-size:12px;color:#C62828}
.hdc-note{font-size:12px;color:#888;font-style:italic;margin-top:4px}

.nl-history-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
.nl-history-card:active{background:var(--cream)}
.nl-history-card.expanded{border-color:var(--green)}
.nlhc-header{display:flex;align-items:center;gap:10px}
.nlhc-date{font-size:13px;font-weight:500;color:var(--ink);flex:1}
.nlhc-count{font-size:12px;color:var(--muted)}
.nlhc-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:none}
.nlhc-detail.show{display:block}
.nlhc-item{padding:5px 0;border-bottom:1px solid var(--cream-dark);font-size:12px}
.nlhc-item:last-child{border-bottom:none}
.nlhc-name{font-weight:500;color:var(--ink)}
.nlhc-status{color:var(--muted);margin-top:2px}

.lock-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:13px}
.lock-banner.locked{background:#E8F5E9;border:1px solid #A5D6A7;color:#2E7D32}
.lock-banner.unlocked{background:var(--brown-pale);border:1px solid #D4A574;color:var(--brown)}
.lock-btn{padding:6px 14px;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;margin-left:auto;white-space:nowrap}
.lock-btn.do-lock{background:var(--green);color:#fff}
.lock-btn.do-unlock{background:var(--brown);color:#fff}

.kk-compare-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--cream-dark);font-size:12px}
.kk-compare-row:last-child{border-bottom:none}

.kk-compare-diff{width:60px;text-align:right;font-weight:500}

// BƯỚC DÁN CONFIG: thay 2 dòng dưới bằng URL và KEY của bạn
const SUPABASE_URL = 'https://zusxbccscuyrrupzdsau.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1c3hiY2NzY3V5cnJ1cHpkc2F1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDQ5OTksImV4cCI6MjA5NTAyMDk5OX0.egR0DsY6VxaRGIWoH58T6EXngH81daUg1pV2-DcS-T4';

let _sbClient = null;
let dbReady = false;
let realtimeChannel = null;

function initDB() {
  try {
    if(typeof window.supabase === 'undefined' || !window.supabase.createClient) {
      throw new Error('Supabase SDK not loaded');
    }
    _sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    dbReady = true;
    console.log('Supabase connected');
  } catch(e) {
    console.warn('Supabase init failed, using localStorage only:', e);
    dbReady = false;
  }
}

// Lưu dữ liệu — upsert vào bảng kalem_data theo key
async function dbSet(key, data) {
  // Luôn backup localStorage
  try { localStorage.setItem('kl_sb_' + key, JSON.stringify(data)); } catch(e) {}
  if(!dbReady) return;
  try {
    await _sbClient.from('kalem_data').upsert({key, value: JSON.stringify(data)}, {onConflict:'key'});
  } catch(e) { console.warn('Supabase set failed:', e); }
}

// Đọc dữ liệu theo key
async function dbGet(key) {
  if(dbReady) {
    try {
      const {data, error} = await _sbClient.from('kalem_data').select('value').eq('key', key).single();
      if(!error && data) return JSON.parse(data.value);
    } catch(e) { console.warn('Supabase get failed:', e); }
  }
  // Fallback localStorage
  try {
    const raw = localStorage.getItem('kl_sb_' + key);
    if(raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

// Realtime listener — dùng polling mỗi 8 giây làm fallback đảm bảo sync
let _pollInterval = null;
let _lastPollHash = {};

function dbListen(cb) {
  // Thử Supabase realtime trước
  if(dbReady) {
    try {
      realtimeChannel = _sbClient
        .channel('kalem_realtime')
        .on('postgres_changes', {event:'*', schema:'public', table:'kalem_data'}, payload => {
          try {
            const key = payload.new && payload.new.key;
            const val = payload.new && payload.new.value ? JSON.parse(payload.new.value) : null;
            if(key && val) cb(key, val);
          } catch(e) {}
        })
        .subscribe((status) => {
          console.log('Realtime status:', status);
        });
    } catch(e) { console.warn('Realtime setup failed:', e); }
  }

  // Polling fallback mỗi 8 giây — đảm bảo luôn sync kể cả khi realtime lỗi
  if(_pollInterval) clearInterval(_pollInterval);
  _pollInterval = setInterval(async () => {
    if(!dbReady) return;
    try {
      const keys = ['checklist','ketca','chamcong','scores','nguyen_lieu','week_assignment','kk_items','kk_records','kk_lock'];
      for(const key of keys) {
        const {data, error} = await _sbClient.from('kalem_data').select('value,updated_at').eq('key',key).single();
        if(!error && data) {
          const hash = data.updated_at;
          if(_lastPollHash[key] && _lastPollHash[key] !== hash) {
            // Có thay đổi mới
            try {
              const val = JSON.parse(data.value);
              cb(key, val);
            } catch(e) {}
          }
          _lastPollHash[key] = hash;
        }
      }
    } catch(e) {}
  }, 8000);

async function load(){
  try {
    const [cl, sc, kc, nl, cc, kkI, kkR, kkL, wkA] = await Promise.all([
      dbGet("checklist"),
      dbGet("scores"),
      dbGet("ketca"),
      dbGet("nguyen_lieu"),
      dbGet("chamcong"),
      dbGet("kk_items"),
      dbGet("kk_records"),
      dbGet("kk_lock"),
      dbGet("week_assignment"),
    ]);

    if(cl && cl.date === getToday()) clState = cl;
    else clState = {date:getToday(), thoa:{}, hanh:{}, hieu:{}};

    if(sc) scoreState = sc;
    if(kc) ketcaState = kc;
    if(nl) nlState = nl;
    if(cc) ccState = cc;
    if(kkI) kkItems = kkI;
    if(kkR) kkRecords = kkR;
    if(kkL) kkLockState = kkL;
    if(wkA) weekAssignment = wkA;

    // Backup vào localStorage
    if(kkI) try{localStorage.setItem('kl_kk_items',JSON.stringify(kkI));}catch(e){}
    if(kkR) try{localStorage.setItem('kl_kk_records',JSON.stringify(kkR));}catch(e){}
    if(kkL) try{localStorage.setItem('kl_kk_lock',JSON.stringify(kkL));}catch(e){}
    if(wkA) try{localStorage.setItem('kl_week_assign',JSON.stringify(wkA));}catch(e){}

  } catch(e) {
    console.warn('load() error, using localStorage fallback:', e);
    clState = {date:getToday(), thoa:{}, hanh:{}, hieu:{}};
    // Fallback: đọc localStorage
    loadKK();
    loadKKLock();
    loadWeekAssignment();
  }
}

function showPIN(title, sub, cb, isAdmin) {
  pinCallback = cb;
  pinIsAdmin = !!isAdmin;
  document.getElementById("pin-title").textContent = title;
  document.getElementById("pin-sub").textContent = sub;
  document.getElementById("pin-input").value = "";
  document.getElementById("pin-error").style.display = "none";
  document.getElementById("pin-modal").classList.add("open");
  setTimeout(()=>document.getElementById("pin-input").focus(), 100);
}

function confirmPIN() {
  const val = document.getElementById("pin-input").value.trim();
  const correct = pinIsAdmin ? (val === ADMIN_PIN) : (val === currentPIN);
  if(correct) {
    document.getElementById("pin-modal").classList.remove("open");
    document.getElementById("pin-input").value = "";
    if(pinCallback) { const cb = pinCallback; pinCallback = null; cb(); }
  } else {
    document.getElementById("pin-error").style.display = "block";
    document.getElementById("pin-input").value = "";
    setTimeout(()=>document.getElementById("pin-input").focus(), 200);
  }
}

function closePIN() {
  document.getElementById("pin-modal").classList.remove("open");
  document.getElementById("pin-input").value = "";
  pinCallback = null;
}

document.getElementById("pin-input").addEventListener("keydown", e=>{
  if(e.key==="Enter") confirmPIN();
});

async function doRefresh() {
  const btn = document.getElementById('refresh-btn');
  if(btn) { btn.classList.add('spinning'); btn.disabled = true; }

  try {
    // Load lại toàn bộ data từ Supabase
    await load();
    // Reload tab hiện tại
    if(currentTab) switchTab(currentTab);
    // Hiện thông báo nhỏ
    const pill = document.getElementById('role-pill');
    if(pill) {
      const orig = pill.textContent;
      pill.textContent = '✓ Đã đồng bộ';
      setTimeout(() => { pill.textContent = orig; }, 1500);
    }
  } catch(e) {
    console.warn('Refresh error:', e);
  }

  setTimeout(() => {
    if(btn) { btn.classList.remove('spinning'); btn.disabled = false; }
  }, 800);
}

function openCLPerson(p){
  currentCLPerson=p;
  // Hiếu xem checklist của nhân viên theo phân công tuần
  const dataRole = (p==='thoa'||p==='hanh') ? getActualRole(p) : p;
  renderMyChecklist(p, dataRole);
}

function renderMyChecklist(p, dataRole){
  if(!dataRole) dataRole = p; // fallback
  const actualData = DATA[dataRole]; // lấy checklist theo vị trí thực tế
  const d=actualData,s=clState[p]||{},r=ROLES[p];
  const total=d.sections.reduce((a,s)=>a+s.tasks.length,0);
  const done=Object.values(s).filter(Boolean).length;
  const pct=total?Math.round(done/total*100):0;
  let h="<div class=\"wrap\">";
  if(currentRole!=="thoa"&&currentRole!=="hanh")
    h+=`<div class="back-row"><button class="back-btn" onclick="renderChecklistHome()">← Tất cả</button><span class="progress-text">${done}/${total} việc</span></div>`;
  else
    h+=`<div class="back-row"><div style="font-size:14px;font-weight:600;color:${r.color}">${r.name}</div><span class="progress-text">${done}/${total} việc</span></div>`;
  h+=`<div class="top-bar-wrap"><div class="top-bar" style="width:${pct}%;background:${r.color}"></div></div>`;
  if(done===total&&total>0)h+="<div class=\"done-banner\">✓ Hoàn thành tất cả công việc hôm nay!</div>";
  d.sections.forEach(sec=>{
    h+=`<div class="task-sec-label">${sec.label}</div>`;
    sec.tasks.forEach(task=>{
      const isDone=!!s[task.id];
      h+=`<div class="task-card${isDone?" done":""}${task.priority?" priority":""}" onclick="toggleTask('${p}','${task.id}')">
        <div class="check-circle${isDone?" "+r.ckClass:""}">${isDone?"<svg width=\"12\" height=\"9\" viewBox=\"0 0 12 9\" fill=\"none\"><polyline points=\"1,4.5 4.5,8 11,1\" stroke=\"white\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>":""}</div>
        <div class="task-body">
          <div class="task-name${task.priority?" ps":""}">${task.name}</div>
          ${task.std?`<div class="task-std">${task.std}</div>`:""}
          ${task.note?`<div class="task-note">${task.note}</div>`:""}
        </div></div>`;
    });
  });
  h+="</div>";
  document.getElementById("main-content").innerHTML=h;
}

function toggleTask(p,id){
  if(!clState[p])clState[p]={};
  clState[p][id]=!clState[p][id];saveCL();
  if(currentRole==="thoa"||currentRole==="hanh")renderMyChecklist(p);
  else renderMyChecklist(currentCLPerson||p);
}

  const p=currentRole,dk=getDateKey(),r=ROLES[p];
  const caLabel=p==="hanh"?"Kết ca 1 — 14:30":"Kết ca 2 — 18:00 (T7/CN: 21:00)";

    h+=renderReportCard(p,kc,false);

    h+=`<div class="ketca-card">

      <div class="field-label">Ghi chú / Sự cố (nếu có)</div>

function renderReportCard(p,kc,confirmed){
  const r=ROLES[p],tm=parseInt(kc.tienmat||0),ck=parseInt(kc.ck||0),total=tm+ck;
  return `<div class="report-card" id="report-card">
    <div class="report-header">
      <div><img class="report-logo-img" src="${LOGO_SRC}" alt="Kalem"><div style="font-size:11px;color:var(--muted);margin-top:2px">Báo cáo kết ca — ${r.name}</div></div>
      <div class="report-date">${getDateKey()}</div>
    </div>
    <div class="report-row"><div class="report-label">Tiền mặt</div><div class="report-value">${fmtMoney(tm)}</div></div>
    ${ck>0?`<div class="report-row"><div class="report-label">Chuyển khoản (Ka nhập)</div><div class="report-value">${fmtMoney(ck)}</div></div>`:''}
    <div class="report-row"><div class="report-label">Số khách</div><div class="report-value">${kc.khach||0} lượt</div></div>
    ${kc.ghichu?`<div class="report-row"><div class="report-label">Ghi chú</div><div class="report-value" style="font-size:13px;color:var(--muted)">${kc.ghichu}</div></div>`:""}
    <div class="report-total"><div class="report-total-label">Tổng doanh thu ca</div><div class="report-total-value">${fmtMoney(total)}</div></div>
    ${confirmed?`<div class="report-confirmed">✓ Đã xác nhận bởi Hiếu · ${kc.confirmedAt||""}</div>`:""}
  </div>`;
}

function submitKetCa(p){
  const tm=document.getElementById("kc-tienmat").value;
  if(!tm||parseInt(tm)<=0){alert("Vui lòng nhập số tiền mặt đếm được trong két");return;}
  const dk=getDateKey();
  if(!ketcaState[dk])ketcaState[dk]={};
  // Giữ lại ck nếu Ka đã nhập trước đó
  const existing=ketcaState[dk][p]||{};
  ketcaState[dk][p]={
    tienmat:tm,
    ck:existing.ck||'0',
    khach:document.getElementById("kc-khach").value,
    ghichu:document.getElementById("kc-ghichu").value,
    submitted:true,confirmed:false,
    submittedAt:new Date().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"})
  };
  saveKC();renderKetCa();
}

function renderXacNhan(){
  const dk=getDateKey();
  let h='<div class="wrap">';
  h+='<div class="sec-title">Xác nhận kết ca hôm nay</div>';
  [['hanh','Kết ca 1 — Hạnh (14:30)'],['thoa','Kết ca 2 — Thoa (18:00/21:00)'],['hieu','Kết ca tối — Hiếu (22:00)']].forEach(function([p,label]){
    const r=ROLES[p], kc=ketcaState[dk]&&ketcaState[dk][p];

    if(!kc||!kc.submitted){
      h+='<div style="background:var(--cream);border-radius:10px;padding:14px;text-align:center;font-size:13px;color:#aaa;margin-bottom:10px">'+r.name+' chưa nộp báo cáo</div>';
    } else if(kc.confirmed){
      h+=renderReportCard(p,kc,true)+'<div style="height:12px"></div>';

        +'<div class="field-label">Chuyển khoản nhận được ca này (đồng)</div>'
        +'<div style="display:flex;gap:8px">'
        +'<input type="number" class="field-input" id="ck-'+p+'" placeholder="0" value="'+ckVal+'" style="margin-bottom:0;flex:1">'
        +'<button class="confirm-btn" style="width:auto;padding:10px 16px;margin-top:0" data-p="'+p+'" onclick="confirmKetCaWithCK(this.dataset.p)">✓ Xác nhận</button>'
        +'</div></div><div style="height:12px"></div>';

function confirmKetCa(p){
  const dk=getDateKey();
  if(ketcaState[dk]&&ketcaState[dk][p]){
    ketcaState[dk][p].confirmed=true;
    ketcaState[dk][p].confirmedAt=new Date().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"});

function confirmKetCaWithCK(p){
  const dk=getDateKey();

  const ck=ckEl?ckEl.value||"0":"0";
  if(ketcaState[dk]&&ketcaState[dk][p]){
    ketcaState[dk][p].ck=ck;
    ketcaState[dk][p].confirmed=true;
    ketcaState[dk][p].confirmedAt=new Date().toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"});

function renderNguyenLieu(){
  const dk = getDateKey();
  if(!nlState[dk]) nlState[dk] = {thoa:[], hanh:[]};

  let h = '<div class="wrap">';

  if(currentRole === 'thoa' || currentRole === 'hanh'){
    // Xác định nhóm theo phân công tuần
    // Vòng trong -> báo bếp (bep), vòng ngoài -> báo pha chế (phache)
    const actualRole = getActualRole(currentRole); // 'thoa' = vòng trong gốc, 'hanh' = vòng ngoài gốc
    const isVongTrong = (actualRole === 'thoa'); // thoa = vòng trong
    const nhomKK = isVongTrong ? 'bep' : 'phache';
    const nhomLabel = isVongTrong ? 'Nguyên liệu bếp' : 'Nguyên liệu pha chế';
    const nhomSub = isVongTrong
      ? 'Báo đồ tươi sống mỗi ngày. Nguyên liệu khô báo khi còn 3–5 ngày.'
      : 'Báo đồ tươi mỗi ngày. Nguyên liệu khô báo khi còn 3–5 ngày.';

    h += '<div class="sec-title">' + nhomLabel + '</div>';
    h += '<div style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">' + nhomSub + '</div>';

    // Lấy danh sách từ kkItems theo nhóm
    const kkList = kkItems.filter(function(item){ return item.group === nhomKK; });

    if(!kkList.length){
      h += '<div style="background:var(--cream);border-radius:10px;padding:20px;text-align:center;font-size:13px;color:#aaa">Hiếu chưa setup danh sách nguyên liệu.<br>Vào tab <strong>Kiểm kê → Thiết lập</strong> để thêm vào.</div>';
    } else {
      // Sync danh sách từ kkItems — luôn đảm bảo đủ món Hiếu đã setup
      var existing = nlState[dk][currentRole] || [];
      var synced = kkList.map(function(item){
        var found = existing.filter(function(e){ return e.name === item.name; })[0];
        return found || {name: item.name, type: item.group === 'bep' ? 'tuoi' : 'kho', status: '', submitted: false, kkGroup: item.group};
      });
      if(JSON.stringify(synced) !== JSON.stringify(existing)){
        nlState[dk][currentRole] = synced;
        saveNL();
      }
      h += renderNLForm(currentRole, dk);
    }
  } else {
    // Hiếu/Admin xem tổng hợp
    h += '<div class="sec-title">Tổng hợp nguyên liệu hôm nay</div>';
    h += renderNLSummary(dk);
    h += '<div class="sec-title" style="margin-top:8px">Lịch sử 7 ngày</div>';
    h += renderNLHistory();
  }

  h += '</div>';
  document.getElementById('main-content').innerHTML = h;
}


function renderNLForm(p, dk){
  const items = nlState[dk][p] || [];
  let h = '';
  items.forEach(function(item, idx){
    h += '<div class="nl-card">'
      + '<div class="nl-header"><div class="nl-name">'+item.name+'</div>'
      + '<span class="nl-type '+(item.type==='tuoi'?'nl-tuoi':'nl-kho')+'">'+(item.type==='tuoi'?'Tươi':'Khô/lâu')+'</span></div>';
    if(item.submitted){
      h += '<div class="nl-submitted" style="display:flex;align-items:center;gap:8px">'
        + '<span style="flex:1">✓ Đã báo lúc '+item.submittedAt+': '+(item.status||'')+'</span>'
        + '<button data-p="'+p+'" data-idx="'+idx+'" onclick="editNLItem(this.dataset.p,this.dataset.idx)" style="background:none;border:none;color:var(--brown);font-size:12px;cursor:pointer;text-decoration:underline;white-space:nowrap;font-family:inherit">Sửa</button>'
        + '</div>';
    } else {
      h += '<div class="nl-input-row">'
        + '<input class="nl-input" placeholder="Tình trạng / số lượng còn lại" value="'+(item.status||'')+'" data-p="'+p+'" data-idx="'+idx+'" oninput="updateNLStatus(this)">'
        + '<button class="nl-save-btn" data-p="'+p+'" data-idx="'+idx+'" onclick="submitNLItem(this.dataset.p,this.dataset.idx)">Báo</button>'
        + '</div>';
    }
    h += '</div>';
  });
  return h;
}

function editNLItem(p, idx){
  idx = parseInt(idx);
  const dk = getDateKey();
  if(nlState[dk] && nlState[dk][p] && nlState[dk][p][idx]){
    nlState[dk][p][idx].submitted = false;
    saveNL();
    renderNguyenLieu();
  }
}

function updateNLStatus(el){
  updateNLItem(el.dataset.p, el.dataset.idx, 'status', el.value);
}

function updateNLItem(p, idx, field, val){
  idx = parseInt(idx);
  const dk = getDateKey();
  if(nlState[dk] && nlState[dk][p] && nlState[dk][p][idx]){
    nlState[dk][p][idx][field] = val;
  }
  saveNL();
}

function submitNLItem(p, idx){
  idx = parseInt(idx);
  const dk = getDateKey();
  if(nlState[dk] && nlState[dk][p] && nlState[dk][p][idx]){
    nlState[dk][p][idx].submitted = true;
    nlState[dk][p][idx].submittedAt = new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
  }
  saveNL();
  renderNguyenLieu();
}

function addNLItem(p, type){
  const dk = getDateKey();
  if(!nlState[dk]) nlState[dk] = {thoa:[], hanh:[]};
  if(!nlState[dk][p]) nlState[dk][p] = [];
  const name = prompt('Tên nguyên liệu:');
  if(!name) return;
  nlState[dk][p].push({name, type, status:'', submitted:false});
  saveNL();
  renderNguyenLieu();
}

function renderNLSummary(dk){
  let h="";
  [["thoa","Pha chế (Thoa)"],["hanh","Bếp (Hạnh)"]].forEach(([p,label])=>{
    const items=nlState[dk]&&nlState[dk][p]||[];
    h+=`<div style="font-size:12px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:0.6px;padding:8px 0 6px">${label}</div>`;
    if(!items.length)
      h+=`<div style="background:var(--cream);border-radius:10px;padding:12px;font-size:13px;color:#aaa;margin-bottom:8px">Chưa có báo cáo hôm nay</div>`;
    else items.forEach(item=>{
      h+=`<div class="nl-card" style="margin-bottom:6px">
        <div class="nl-header"><div class="nl-name">${item.name}</div><span class="nl-type ${item.type==="tuoi"?"nl-tuoi":"nl-kho"}">${item.type==="tuoi"?"Tươi":"Khô"}</span></div>
        <div style="font-size:13px;color:#444">${item.status||"—"}</div>
        ${item.submitted?`<div class="nl-submitted">✓ Đã báo lúc ${item.submittedAt}</div>`:`<div class="nl-pending">⏳ Chưa xác nhận</div>`}
      </div>`;
    });
  });
  return h;
}

function renderNLHistory(){
  let h="";
  const today=new Date();
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const dk=d.toLocaleDateString("vi-VN",{day:"2-digit",month:"2-digit",year:"numeric"});
    const data=nlState[dk];if(!data)continue;
    const tc=(data.thoa||[]).filter(x=>x.submitted).length;
    const hc=(data.hanh||[]).filter(x=>x.submitted).length;
    if(!tc&&!hc)continue;
    h+=`<div class="dt-day-card">
      <div class="dt-day-header"><div class="dt-day-date">${dk}</div></div>
      <div class="dt-ca-row"><span>Pha chế (Thoa)</span><span>${tc} mục đã báo</span></div>
      <div class="dt-ca-row"><span>Bếp (Hạnh)</span><span>${hc} mục đã báo</span></div>
    </div>`;
  }
  return h||"<div style=\"font-size:13px;color:#aaa;text-align:center;padding:20px\">Chưa có lịch sử</div>";
}

function calcAvg(scores){const v=Object.values(scores).filter(x=>x>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;}

function renderChamDiem(){
  if(currentScorePerson){renderScoringDetail(currentScorePerson);return;}
  const dk=getDateKey();
  let h="<div class=\"wrap\">";
  h+="<div class=\"sec-title\">Chấm điểm hôm nay</div>";
  h+="<div style=\"font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5\">Chấm từng mục công việc từ 1–10. App tự tính trung bình và tích lũy theo tháng.</div>";
  ["thoa","hanh"].forEach(p=>{
    const r=ROLES[p],s=scoreState[dk]&&scoreState[dk][p];
    const avg=s&&Object.keys(s).length?calcAvg(s):null;
    h+=`<div class="score-person-card" onclick="openScoring('${p}')">
      <div class="avatar ${r.avClass}">${r.avatar}</div>
      <div class="person-info"><div class="person-name">${r.name}</div><div class="person-role">${avg?"Đã chấm hôm nay":"Chưa chấm hôm nay"}</div></div>
      <div class="score-badge badge-${p}">${avg?avg.toFixed(1)+"/10":"→"}</div>
    </div>`;
  });
  h+="</div>";
  document.getElementById("main-content").innerHTML=h;
}

function openScoring(p){currentScorePerson=p;renderScoringDetail(p);}

function renderScoringDetail(p){
  const dk=getDateKey();
  if(!scoreState[dk])scoreState[dk]={};
  if(!scoreState[dk][p])scoreState[dk][p]={};
  const saved=scoreState[dk][p],r=ROLES[p];
  const avg=Object.keys(saved).length?calcAvg(saved):null;
  let h="<div class=\"wrap\">";
  h+=`<div class="back-row"><button class="back-btn" onclick="currentScorePerson=null;renderChamDiem()">← Chấm điểm</button></div>`;
  h+=avg!==null?`<div class="today-scored" id="avg-disp">Điểm trung bình: <strong>${avg.toFixed(1)}/10</strong></div>`:`<div class="today-scored" id="avg-disp" style="display:none"></div>`;
  h+=`<div style="font-size:13px;font-weight:600;color:${r.color};margin-bottom:12px">Chấm điểm cho ${r.name}</div>`;
  // Dùng checklist theo vòng thực tế tuần này
  const actualDataRole = getActualRole(p);
  const dataSource = DATA[actualDataRole] || DATA[p];
  dataSource.sections.forEach(sec=>{
    h+=`<div class="task-sec-label">${sec.label}</div>`;
    sec.tasks.forEach(task=>{
      const val=saved[task.id]||5;
      h+=`<div class="score-task-card">
        <div class="score-task-name${task.priority?" ps":""}">${task.name}</div>
        <div class="slider-row"><input type="range" min="1" max="10" step="1" value="${val}" data-person="${p}" data-task="${task.id}" oninput="onSlider(this)"><div class="score-num" id="sv-${task.id}">${val}</div></div>
        <div class="score-labels"><span>1 · Kém</span><span>10 · Xuất sắc</span></div>
      </div>`;
    });
  });
  h+=`<button class="save-score-btn" onclick="finishScoring('${p}')">Lưu điểm cho ${r.name} ✓</button><div style="height:24px"></div>`;
  document.getElementById("main-content").innerHTML=h;
}

function onSlider(el){
  const p=el.dataset.person,id=el.dataset.task,val=parseInt(el.value);
  document.getElementById("sv-"+id).textContent=val;
  const dk=getDateKey();
  if(!scoreState[dk])scoreState[dk]={};
  if(!scoreState[dk][p])scoreState[dk][p]={};
  scoreState[dk][p][id]=val;saveSC();
  const avg=calcAvg(scoreState[dk][p]);
  const el2=document.getElementById("avg-disp");
  if(el2){el2.style.display="";el2.innerHTML=`Điểm trung bình: <strong>${avg.toFixed(1)}/10</strong>`;}
}

function finishScoring(p){saveSC();alert("Đã lưu điểm cho "+ROLES[p].name+"!");currentScorePerson=null;renderChamDiem();}

function renderTongKet(){
  const mk=getMonthKey(currentMonth);
  let h="<div class=\"wrap\">";
  h+=`<div class="threshold-card">
    <div style="font-size:13px;font-weight:500;color:var(--ink)">Ngưỡng điểm xét thưởng</div>
    <div class="threshold-row">
      <div style="font-size:13px;color:#666;flex:1">Điểm trung bình tháng ≥</div>
      <input type="number" class="threshold-input" id="threshold-input" min="1" max="10" value="${threshold}">
      <button class="save-threshold-btn" onclick="saveThreshold()">Lưu</button>
    </div></div>`;
  h+=`<div class="month-picker"><button class="month-nav" onclick="changeMonth(-1)">‹</button><div style="font-size:14px;font-weight:500">${mk}</div><button class="month-nav" onclick="changeMonth(1)">›</button></div>`;
  ["thoa","hanh"].forEach(p=>{
    const r=ROLES[p];
    const days=[];
    Object.keys(scoreState).forEach(dk=>{
      if(!scoreState[dk]||!scoreState[dk][p])return;
      const parts=dk.split("/");if(parts.length<3)return;
      const d=new Date(parseInt(parts[2]),parseInt(parts[1])-1,parseInt(parts[0]));
      if(d.getMonth()===currentMonth.getMonth()&&d.getFullYear()===currentMonth.getFullYear()){
        const avg=calcAvg(scoreState[dk][p]);if(avg>0)days.push({date:dk,avg});
      }
    });
    const n=days.length,mAvg=n?days.reduce((a,b)=>a+b.avg,0)/n:0;
    const isReward=mAvg>=threshold&&n>0,above=days.filter(d=>d.avg>=threshold).length;
    const maxScore=n?Math.max(...days.map(d=>d.avg)):0;
    h+=`<div class="month-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div class="avatar ${r.avClass}" style="width:38px;height:38px;font-size:13px">${r.avatar}</div>
        <div><div style="font-size:15px;font-weight:500">${r.name}</div><div style="font-size:12px;color:#aaa">${mk}</div></div>
        <div style="margin-left:auto;text-align:right"><div class="month-avg">${n?mAvg.toFixed(1):"–"}</div><div style="font-size:11px;color:#aaa">/ 10</div></div>
      </div>
      <div class="month-stat-row">
        <div class="month-stat"><div class="month-stat-num">${n}</div><div class="month-stat-label">ngày chấm</div></div>
        <div class="month-stat"><div class="month-stat-num">${above}</div><div class="month-stat-label">ngày đạt ngưỡng</div></div>
        <div class="month-stat"><div class="month-stat-num">${n?maxScore.toFixed(1):"–"}</div><div class="month-stat-label">điểm cao nhất</div></div>
      </div>
      ${n>0?`<div><span class="reward-badge ${isReward?"reward-yes":"reward-no"}">${isReward?"✓ Đủ điều kiện thưởng":"✗ Chưa đạt ngưỡng thưởng"}</span></div>`:""}
    </div>`;
  });
  h+="</div>";
  document.getElementById("main-content").innerHTML=h;
}

function saveThreshold(){
  threshold=parseInt(document.getElementById("threshold-input").value)||7;
  if(threshold<1)threshold=1;if(threshold>10)threshold=10;
  localStorage.setItem("kl_th4",threshold);renderTongKet();alert("Đã lưu ngưỡng: "+threshold+"/10");
}

function changeMonth(d){
  currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+d,1);
  if(currentTab==="tong-ket")renderTongKet();
  else if(currentTab==="doanh-thu")renderDoanhThu();
}

function renderDoanhThu(){
  const mk=getMonthKey(currentMonth);
  let totalMonth=0,totalDays=0;
  const dayCards=[];
  const today=new Date();
  for(let i=0;i<31;i++){
    const d=new Date(currentMonth.getFullYear(),currentMonth.getMonth(),i+1);
    if(d.getMonth()!==currentMonth.getMonth())break;
    if(d>today)continue;
    const dk=d.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});
    const kc=ketcaState[dk];
    const ca1=kc&&kc.hanh,ca2=kc&&kc.thoa,ca3=kc&&kc.hieu;
    const t1=ca1?(parseInt(ca1.tienmat||0)+parseInt(ca1.ck||0)):0;
    const t2=ca2?(parseInt(ca2.tienmat||0)+parseInt(ca2.ck||0)):0;
    const t3=ca3?(parseInt(ca3.tienmat||0)+parseInt(ca3.ck||0)):0;
    const dt=t1+t2+t3;
    if(dt>0){totalMonth+=dt;totalDays++;}
    dayCards.push({dk,d,ca1,ca2,ca3,t1,t2,t3,dt});
  }

  let h='<div class="wrap">';
  h+='<div class="month-picker">'
    +'<button class="month-nav" onclick="changeMonth(-1)">‹</button>'
    +'<div style="font-size:14px;font-weight:500">'+mk+'</div>'
    +'<button class="month-nav" onclick="changeMonth(1)">›</button>'
    +'</div>';
  h+='<div class="summary-stats">'
    +'<div class="summary-stat"><div class="summary-stat-num">'+fmtMoney(totalMonth)+'</div><div class="summary-stat-label">Tổng doanh thu tháng</div></div>'
    +'<div class="summary-stat"><div class="summary-stat-num">'+totalDays+' ngày</div><div class="summary-stat-label">Có doanh thu</div></div>'
    +'</div>';

  if(!dayCards.length){
    h+='<div style="text-align:center;color:#aaa;padding:32px;font-size:13px">Chưa có dữ liệu tháng này</div>';
  } else {
    dayCards.reverse().forEach(function(item){
      const dk=item.dk, ca1=item.ca1, ca2=item.ca2, ca3=item.ca3, dt=item.dt;
      const dow=getDOW(parseDateVN(dk));
      const totalCK=(ca1?parseInt(ca1.ck||0):0)+(ca2?parseInt(ca2.ck||0):0)+(ca3?parseInt(ca3.ck||0):0);
      const totalTM=(ca1&&ca1.confirmed?parseInt(ca1.tienmat||0):0)
                   +(ca2&&ca2.confirmed?parseInt(ca2.tienmat||0):0)
                   +(ca3&&ca3.confirmed?parseInt(ca3.tienmat||0):0);

      // Ca rows
      var ca1txt = ca1&&ca1.confirmed ? fmtMoney(parseInt(ca1.tienmat||0))
                 : ca1&&ca1.submitted ? '<span style="color:var(--brown)">Chờ XN</span>'
                 : '<span style="color:#C62828">Chưa báo</span>';
      var ca2txt = ca2&&ca2.confirmed ? fmtMoney(parseInt(ca2.tienmat||0))
                 : ca2&&ca2.submitted ? '<span style="color:var(--brown)">Chờ XN</span>'
                 : '<span style="color:#C62828">Chưa báo</span>';
      var ca3txt = ca3&&ca3.confirmed ? fmtMoney(parseInt(ca3.tienmat||0))
                 : ca3&&ca3.submitted ? '<span style="color:var(--brown)">Chờ XN</span>'
                 : '<span style="color:#C62828">Chưa báo</span>';

      // Ghi chú
      var ghichus='';
      [ca1,ca2,ca3].forEach(function(c){ if(c&&c.ghichu) ghichus+='<div style="font-size:12px;color:#888;font-style:italic;margin-top:3px">'+c.ghichu+'</div>'; });

      // Tổng khách
      var totalKhach=[ca1,ca2,ca3].reduce(function(a,c){return a+parseInt(c&&c.khach||0);},0);
      var khachRow=totalKhach>0?'<div class="hdc-row"><span>Tổng khách</span><span>'+totalKhach+' lượt</span></div>':'';

      // CK đã nhập
      var ckSaved=totalCK>0?'<div style="font-size:12px;color:var(--green);margin-top:4px">✓ Đã nhập: '+fmtMoney(totalCK)+'</div>':'';

      h+='<div class="history-day-card" id="dtcard-'+dk+'">'
        +'<div class="hdc-header" onclick="toggleDTCard(\''+dk+'\')">'
        +'<div class="hdc-date">'+dk+' <span style="color:var(--muted);font-size:12px">('+dow+')</span></div>'
        +'<div class="hdc-total">'+(dt?fmtMoney(dt):'—')+'</div>'
        +'<div class="hdc-arrow" id="dtarrow-'+dk+'">›</div>'
        +'</div>'
        +'<div class="hdc-detail" id="dtdetail-'+dk+'">'
        +'<div class="hdc-row"><span>Ca 1 — Hạnh (tiền mặt)</span><span>'+ca1txt+'</span></div>'
        +'<div class="hdc-row"><span>Ca 2 — Thoa (tiền mặt)</span><span>'+ca2txt+'</span></div>'
        +'<div class="hdc-row"><span>Ca tối — Hiếu (tiền mặt)</span><span>'+ca3txt+'</span></div>'
        +'<div class="hdc-row" style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px">'
        +'<span>Tổng tiền mặt</span><span style="font-weight:500">'+fmtMoney(totalTM)+'</span></div>'
        +'<div style="background:var(--green-pale);border-radius:8px;padding:10px;margin-top:8px">'
        +'<div style="font-size:12px;font-weight:600;color:var(--green);margin-bottom:6px">Chuyển khoản — Ka nhập</div>'
        +'<div style="display:flex;gap:8px;align-items:center">'
        +'<input type="number" id="ck-dt-'+dk+'" value="'+(totalCK||'')+'" placeholder="Tổng CK ngày này" '
        +'style="flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#fff" '
        +'onclick="event.stopPropagation()">'
        +'<button onclick="event.stopPropagation();saveKaDayCK(\''+dk+'\')" '
        +'style="padding:8px 14px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit">Lưu</button>'
        +'</div>'+ckSaved+'</div>'
        +'<div class="hdc-row" style="font-weight:600;margin-top:6px">'
        +'<span>Tổng cộng</span><span style="color:var(--green);font-size:15px">'+fmtMoney(dt)+'</span></div>'
        +ghichus+khachRow
        +'</div></div>';
    });
  }
  h+='</div>';
  document.getElementById('main-content').innerHTML=h;
}

function renderChamCong(){
  const dk = getDateKey();
  if(!ccState[dk]) ccState[dk]={};
  const {startDate} = getKyLuong();
  const today = new Date();

  let h = '<div class="cc-wrap">';
  h += '<div class="sec-title">Chấm công hôm nay — '+dk+'</div>';

  // Hôm nay
  ['thoa','hanh','hieu'].forEach(function(p){
    h += buildCCBlock(p, dk);
  });

  // Các ngày trước trong kỳ
  h += '<div class="sec-title" style="margin-top:12px">Bổ sung ngày trước</div>';
  h += '<div style="font-size:13px;color:var(--muted);margin-bottom:10px">Bấm vào ngày chưa chấm để bổ sung.</div>';

  var days = [];
  var cur = new Date(startDate);
  while(cur < today){
    days.push(new Date(cur));
    cur.setDate(cur.getDate()+1);
  }
  days.reverse();

  days.forEach(function(d){
    var ddk = formatDateVN(d);
    var dow = getDOW(d);
    var isWE = isWeekendOrHoliday(d);
    var dayRec = ccState[ddk]||{};
    var allDone = ['thoa','hanh','hieu'].every(function(p){ return dayRec[p]&&dayRec[p].saved; });
    var anyDone = ['thoa','hanh','hieu'].some(function(p){ return dayRec[p]&&dayRec[p].saved; });
    var borderColor = allDone ? 'var(--border)' : 'var(--brown)';
    var statusText = allDone ? '✓ Đã chấm đủ 3 người' : anyDone ? '⚠ Chấm chưa đủ' : '✗ Chưa chấm';
    var dayColor = isWE ? '#C62828' : 'var(--muted)';

    h += '<div style="background:var(--white);border:1px solid '+borderColor+';border-radius:12px;margin-bottom:8px;overflow:hidden">';
    h += '<div class="cc-day-header" data-dk="'+ddk+'" onclick="toggleCCDayEl(this)" style="display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer">';
    h += '<div style="flex:1">';
    h += '<div style="font-size:13px;font-weight:500;color:var(--ink)">'+ddk+' <span style="color:'+dayColor+';font-size:12px">('+dow+')</span></div>';
    h += '<div style="font-size:12px;color:var(--muted);margin-top:2px">'+statusText+'</div>';
    h += '</div>';
    h += '<div style="font-size:18px;color:var(--muted);transition:transform 0.2s" class="cc-day-arrow">›</div>';
    h += '</div>';
    h += '<div class="cc-day-body" style="display:none;padding:0 6px 10px">';
    ['thoa','hanh','hieu'].forEach(function(p){
      h += buildCCBlock(p, ddk);
    });
    h += '</div></div>';
  });

  h += '</div>';
  document.getElementById('main-content').innerHTML = h;
}



// Time selector 24h tự build — không phụ thuộc locale máy
function buildTimeSelect(id, defaultVal) {
  // Parse defaultVal
  var defH = '', defM = '';
  if(defaultVal && defaultVal.indexOf(':') >= 0) {
    var parts = defaultVal.split(':');
    defH = parts[0] || '';
    defM = parts[1] ? parts[1].substring(0,2) : '';
  }

  var hours = '<option value="">--</option>';
  for(var h = 0; h <= 23; h++) {
    var hh = (h < 10 ? '0' : '') + h;
    var sel = (hh === defH) ? ' selected' : '';
    hours += '<option value="' + hh + '"' + sel + '>' + hh + 'h</option>';
  }
  var mins = '<option value="">--</option>';
  for(var mi = 0; mi <= 59; mi++) {
    var mm = (mi < 10 ? '0' : '') + mi;
    var sel2 = (mm === defM) ? ' selected' : '';
    mins += '<option value="' + mm + '"' + sel2 + '>' + mm + '</option>';
  }

  // Tính hidden value từ default
  var hiddenVal = (defH && defM) ? defH + ':' + defM : '';

  return '<div style="display:flex;align-items:center;gap:4px">'
    + '<select class="cc-time-input" id="' + id + '-h" style="flex:1;padding:8px 6px" data-timeid="' + id + '" onchange="syncTimeVal(this.dataset.timeid)">'
    + hours + '</select>'
    + '<span style="font-weight:600;color:var(--muted)">:</span>'
    + '<select class="cc-time-input" id="' + id + '-m" style="width:70px;padding:8px 6px" data-timeid="' + id + '" onchange="syncTimeVal(this.dataset.timeid)">'
    + mins + '</select>'
    + '<input type="hidden" id="' + id + '" value="' + hiddenVal + '">'
    + '</div>';
}

function syncTimeVal(id) {
  var h = document.getElementById(id + '-h');
  var m = document.getElementById(id + '-m');
  var hidden = document.getElementById(id);
  if(h && m && hidden) {
    hidden.value = (h.value && m.value) ? h.value + ':' + m.value : '';
  }
}

function setTimeSelect(id, val) {
  if(!val) return;
  var parts = val.split(':');
  var hEl = document.getElementById(id + '-h');
  var mEl = document.getElementById(id + '-m');
  var hidden = document.getElementById(id);
  if(hEl) hEl.value = parts[0] || '';
  var mVal = parts[1] ? (parts[1].length === 2 ? parts[1] : '0' + parts[1]) : '00';
  if(mEl) mEl.value = mVal;
  if(hidden) hidden.value = (parts[0] && mVal) ? parts[0] + ':' + mVal : '';
}

function getTimeVal(id) {
  var hidden = document.getElementById(id);
  return hidden ? hidden.value : '';
}

// Fix: force 24h display cho tất cả input time
function fixTimeInputs() {
  document.querySelectorAll('input[type="time"]').forEach(function(el) {
    el.setAttribute('lang', 'vi-VN');
    // Nếu browser vẫn dùng 12h, đổi sang text+pattern
    const val = el.value;
    if(val) {
      const temp = el.value;
      el.value = '';
      el.value = temp;
    }
  });
}

function toggleCCDayEl(el){
  var body = el.nextElementSibling;
  var arrow = el.querySelector('.cc-day-arrow');
  if(!body) return;
  var isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  if(arrow) arrow.style.transform = isOpen ? '' : 'rotate(90deg)';
}

function buildCCBlock(p, dk){
  if(!ccState[dk]) ccState[dk]={};
  var rec = ccState[dk][p]||{};
  var isSaved = rec.saved;
  var r = ROLES[p];
  var info = CC_PEOPLE[p];
  if(!info) return '';
  var status = rec.status||'ok';
  var needReason = ['late','sick','leave','early'].indexOf(status) >= 0;

  var h = '<div class="cc-person-block">';
  h += '<div class="cc-person-header">';
  h += '<div class="avatar '+r.avClass+'" style="width:38px;height:38px;font-size:13px">'+r.avatar+'</div>';
  h += '<div><div class="cc-person-name">'+info.name+'</div>';
  h += '<div class="cc-person-shift">'+info.shift+'</div></div></div>';

  if(isSaved){
    var st = CC_STATUSES[rec.status]||CC_STATUSES.ok;
    h += '<div class="cc-saved-banner">';
    h += '<span class="att-badge '+st.badge+'">'+st.label+'</span>';
    h += ' &nbsp; Vào: <strong>'+(rec.inTime||'—')+'</strong>';
    h += ' &nbsp; Ra: <strong>'+(rec.outTime||'—')+'</strong>';
    if(rec.reason) h += '<br><span style="color:#555;font-size:12px;margin-top:4px;display:block">Lý do: '+rec.reason+'</span>';
    h += '<button class="cc-edit-btn" data-p="'+p+'" data-dk="'+dk+'" onclick="editCCDK(this.dataset.p,this.dataset.dk)">Sửa</button>';
    h += '</div>';
  } else {
    h += '<div class="cc-status-row">';
    Object.keys(CC_STATUSES).forEach(function(key){
      var st = CC_STATUSES[key];
      var sel = status===key ? ' '+st.cls : '';
      h += '<button class="cc-status-btn'+sel+'" data-p="'+p+'" data-dk="'+dk+'" data-key="'+key+'" onclick="setCCStatusDK(this.dataset.p,this.dataset.key,this.dataset.dk)">'+st.label+'</button>';
    });
    h += '</div>';
    var inId = 'cc-in-'+p+'-'+dk;
    var outId = 'cc-out-'+p+'-'+dk;
    h += '<div class="cc-time-row">';
    h += '<div class="cc-time-group"><div class="cc-time-label">Giờ vào ca</div>';
    h += buildTimeSelect(inId, rec.inTime||info.inTime);
    h += '</div>';
    h += '<div class="cc-time-group"><div class="cc-time-label">Giờ ra ca</div>';
    h += buildTimeSelect(outId, rec.outTime||'');
    h += '</div>';
    h += '</div>';
    if(needReason){
      h += '<div class="cc-reason-wrap">';
      h += '<input class="cc-reason-input" id="cc-reason-'+p+'-'+dk+'" placeholder="Nhập lý do..." value="'+(rec.reason||'')+'">';
      h += '</div>';
    }
    h += '<div class="cc-save-row">';
    h += '<button class="cc-save-btn" data-p="'+p+'" data-dk="'+dk+'" onclick="saveCCRecordDK(this.dataset.p,this.dataset.dk)">Lưu chấm công '+info.name+'</button>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function setCCStatusDK(p,status,dk){
  if(!ccState[dk]) ccState[dk]={};
  if(!ccState[dk][p]) ccState[dk][p]={};
  ccState[dk][p].status=status;
  saveCC(); renderChamCong();
}

function editCCDK(p,dk){
  if(ccState[dk]&&ccState[dk][p]) ccState[dk][p].saved=false;
  saveCC(); renderChamCong();
}

function saveCCRecordDK(p,dk){
  if(!ccState[dk]) ccState[dk]={};
  var status=(ccState[dk][p]&&ccState[dk][p].status)||'ok';
  var needReason=['late','sick','leave','early'].indexOf(status)>=0;
  var reasonEl=document.getElementById('cc-reason-'+p+'-'+dk);
  var inTime=getTimeVal('cc-in-'+p+'-'+dk);
  var outTime=getTimeVal('cc-out-'+p+'-'+dk);
  var reason=reasonEl?reasonEl.value.trim():'';
  if(!inTime){alert('Vui lòng chọn giờ vào ca');return;}
  if(!outTime){alert('Vui lòng chọn giờ ra ca');return;}
  if(needReason&&!reason){alert('Vui lòng nhập lý do');return;}
  ccState[dk][p]={status,inTime,outTime,reason,saved:true,
    savedAt:new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})};
  saveCC(); renderChamCong();
}


function renderAttendance(){
  const mk = getMonthKey(currentMonth);
  let h = '<div class="wrap">';
  h += `<div class="month-picker">
    <button class="month-nav" onclick="changeMonthAtt(-1)">‹</button>
    <div style="font-size:14px;font-weight:500">${mk}</div>
    <button class="month-nav" onclick="changeMonthAtt(1)">›</button>
  </div>`;

  // Tổng hợp
  const people = ['thoa','hanh','hieu'];
  const summary = {};
  people.forEach(p=>{ summary[p]={ok:0,late:0,sick:0,leave:0,early:0,total:0}; });

  const daysInMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth()+1, 0).getDate();
  const rows = [];
  for(let i=1; i<=daysInMonth; i++){
    const d = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), i);
    if(d > new Date()) break;
    const dk = d.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});
    const dayData = ccState[dk] || {};
    const row = {dk, data:{}};
    people.forEach(p=>{
      const rec = dayData[p];
      if(rec&&rec.saved){
        row.data[p] = rec;
        summary[p][rec.status] = (summary[p][rec.status]||0)+1;
        summary[p].total++;
      }
    });
    rows.push(row);
  }

  // Summary cards mỗi người
  people.forEach(p=>{
    const r = ROLES[p], s = summary[p];
    if(s.total===0) return;
    h += `<div style="font-size:12px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:0.6px;padding:8px 0 6px">${r.name} — ${mk}</div>`;
    h += `<div class="att-summary">
      <div class="att-sum-item"><div class="att-sum-num" style="color:#2E7D32">${s.ok||0}</div><div class="att-sum-label">Đúng giờ</div></div>
      <div class="att-sum-item"><div class="att-sum-num" style="color:#E65100">${s.late||0}</div><div class="att-sum-label">Đi trễ</div></div>
      <div class="att-sum-item"><div class="att-sum-num" style="color:#C62828">${s.sick||0}</div><div class="att-sum-label">Nghỉ ốm</div></div>
      <div class="att-sum-item"><div class="att-sum-num" style="color:var(--green)">${s.leave||0}</div><div class="att-sum-label">Nghỉ phép</div></div>
      <div class="att-sum-item"><div class="att-sum-num" style="color:var(--brown)">${s.early||0}</div><div class="att-sum-label">Về sớm</div></div>
    </div>`;
  });

  // Bảng chi tiết
  h += `<div style="font-size:12px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:0.6px;padding:8px 0 6px">Chi tiết từng ngày</div>`;
  h += `<div style="overflow-x:auto">
  <table class="att-table">
    <tr><th>Ngày</th><th>Thoa</th><th>Hạnh</th><th>Hiếu</th></tr>`;
  rows.reverse().forEach(({dk, data})=>{
    h += `<tr><td style="white-space:nowrap;font-size:11px">${dk}</td>`;
    people.forEach(p=>{
      const rec = data[p];
      if(rec){
        const st = CC_STATUSES[rec.status]||CC_STATUSES.ok;
        h += `<td>
          <span class="att-badge ${st.badge}">${st.label}</span>
          <div style="font-size:11px;color:#888;margin-top:2px">${rec.inTime||'—'} → ${rec.outTime||'—'}</div>
          ${rec.reason?`<div style="font-size:11px;color:#b5813a;margin-top:1px">${rec.reason}</div>`:''}
        </td>`;
      } else {
        h += `<td><span class="att-badge att-none">Chưa chấm</span></td>`;
      }
    });
    h += `</tr>`;
  });
  h += `</table></div></div>`;
  document.getElementById('main-content').innerHTML = h;
}

function changeMonthAtt(d){
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth()+d, 1);
  renderAttendance();
}

// Lấy kỳ lương hiện tại (từ 15 tháng trước/hiện tại đến hôm nay)
function getKyLuong() {
  const today = new Date();
  const day = today.getDate();
  let startDate, endDate;
  if(day >= 15) {
    startDate = new Date(today.getFullYear(), today.getMonth(), 15);
  } else {
    startDate = new Date(today.getFullYear(), today.getMonth()-1, 15);
  }
  endDate = today;
  return {startDate, endDate};
}

function formatDateVN(d) {
  return d.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function parseDateVN(str) {
  const parts = str.split('/');
  if(parts.length < 3) return null;
  return new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
}

function isWeekendOrHoliday(d) {
  const dow = d.getDay();
  return dow === 0 || dow === 6;
}

function getDOW(d) {
  return ['CN','T2','T3','T4','T5','T6','T7'][d.getDay()];
}

function getStandardOut(p, d) {
  const cfg = LUONG_CONFIG[p];
  if(!cfg) return '22:00';
  const dow = d.getDay();
  if(dow === 0 || dow === 6) return cfg.gioRaCN;
  return cfg.gioRa;
}

function timeToMinutes(t) {
  if(!t || !t.includes(':')) return 0;
  const [h,m] = t.split(':').map(Number);
  return h*60 + m;
}

function minutesToHours(m) { return m/60; }

function calcOT(p, d, outActual) {
  const stdOut = getStandardOut(p, d);
  const stdMin = timeToMinutes(stdOut);
  const actMin = timeToMinutes(outActual);
  if(actMin <= stdMin) return 0;
  const extraMin = actMin - stdMin;
  const extraHours = minutesToHours(extraMin);
  // Tăng ca tối: giờ sau 18:00
  const cutoffMin = 18*60;
  if(stdMin >= cutoffMin) {
    return extraHours * TC_TOI;
  } else if(actMin > cutoffMin) {
    const dayHours = minutesToHours(cutoffMin - stdMin);
    const nightHours = minutesToHours(actMin - cutoffMin);
    return dayHours * TC_NGAY + nightHours * TC_TOI;
  } else {
    return extraHours * TC_NGAY;
  }
}

function calcEarlyDeduct(p, d, outActual) {
  const stdOut = getStandardOut(p, d);
  const stdMin = timeToMinutes(stdOut);
  const actMin = timeToMinutes(outActual);
  if(actMin >= stdMin) return 0;
  const shortMin = stdMin - actMin;
  const shortHours = minutesToHours(shortMin);
  const cutoffMin = 18*60;
  if(actMin >= cutoffMin || stdMin <= cutoffMin) {
    const rate = stdMin <= cutoffMin ? TC_NGAY : TC_TOI;
    return shortHours * rate;
  } else {
    const nightHours = minutesToHours(stdMin - cutoffMin);
    const dayHours = shortHours - nightHours;
    return dayHours * TC_NGAY + nightHours * TC_TOI;
  }
}

function tinhLuong(p) {
  if(!LUONG_CONFIG[p] || LUONG_CONFIG[p].luongThang === 0) return null;
  const cfg = LUONG_CONFIG[p];
  const {startDate, endDate} = getKyLuong();
  const luongNgay = cfg.luongThang / NGAY_CONG;

  let ngayLamDuoc = 0;
  let ngayNghiKhongLy = 0;
  let ngayNghiCo = 0;
  let ngayPhepCoLuong = 0;
  let tongOT = 0;
  let tongTruSom = 0;
  let ngayTruThem = 0; // nghỉ T7/CN/lễ sai
  const chiTiet = [];

  // Duyệt từng ngày trong kỳ
  let cur = new Date(startDate);
  while(cur <= endDate) {
    const dk = formatDateVN(cur);
    const rec = ccState[dk] && ccState[dk][p];
    const isWE = isWeekendOrHoliday(cur);
    const dow = getDOW(cur);

    if(rec && rec.saved) {
      const status = rec.status;
      const outTime = rec.outTime || '';

      if(status === 'ok' || status === 'late') {
        ngayLamDuoc++;
        if(outTime) {
          const ot = calcOT(p, cur, outTime);
          tongOT += ot;
        }
        chiTiet.push({dk, dow, status, inTime:rec.inTime, outTime, ly_do:rec.reason||'', cong:1, ot: outTime?calcOT(p,cur,outTime):0, tru:0});
      } else if(status === 'early') {
        ngayLamDuoc++;
        const tru = outTime ? calcEarlyDeduct(p, cur, outTime) : 0;
        tongTruSom += tru;
        chiTiet.push({dk, dow, status, inTime:rec.inTime, outTime, ly_do:rec.reason||'', cong:1, ot:0, tru});
      } else if(status === 'sick' || status === 'leave') {
        if(isWE) {
          // Nghỉ T7/CN không được tính phép có lương, trừ thêm 1 ngày
          ngayTruThem++;
          chiTiet.push({dk, dow, status:'wrong_leave', inTime:'', outTime:'', ly_do:rec.reason||'Nghỉ T7/CN', cong:0, ot:0, tru:luongNgay, warn:true});
        } else {
          if(ngayPhepCoLuong < NGAY_PHEP_CO_LUONG) {
            ngayPhepCoLuong++;
            chiTiet.push({dk, dow, status, inTime:'', outTime:'', ly_do:rec.reason||'', cong:'phép', ot:0, tru:0});
          } else {
            ngayNghiKhongLy++;
            chiTiet.push({dk, dow, status:'no_pay', inTime:'', outTime:'', ly_do:rec.reason||'', cong:0, ot:0, tru:0});
          }
        }
      }
    }
    cur.setDate(cur.getDate()+1);
  }

  const luongCoBan = ngayLamDuoc * luongNgay;
  const truSai = ngayTruThem * luongNgay;
  const tongLuong = luongCoBan + tongOT - tongTruSom - truSai;

  return {
    p, cfg, luongNgay, ngayLamDuoc, ngayNghiKhongLy,
    ngayPhepCoLuong, ngayTruThem, tongOT, tongTruSom,
    luongCoBan, truSai, tongLuong, chiTiet,
    startDate, endDate,
  };
}

function fmtK(n) {
  if(n === 0) return '0đ';
  return Math.round(n).toLocaleString('vi-VN') + 'đ';
}
